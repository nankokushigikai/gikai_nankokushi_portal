<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://cdn.quilljs.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.quilljs.com 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://gnnfzimhfizbfhvwuzbf.supabase.co wss://gnnfzimhfizbfhvwuzbf.supabase.co https://accounts.google.com https://www.googleapis.com https://calendar.google.com; worker-src blob:; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南国市の条例 | 議員ナレッジ共有</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="knowledge.html" class="text-lg font-bold hover:text-gray-200">議員ナレッジ共有</a>
            <span class="text-sm">南国市の条例</span>
        </div>
    </header>
    <main class="container mx-auto py-8 px-4">
        <div class="mb-6"><a href="knowledge.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">ナレッジトップへ戻る</a></div>
        <h1 class="text-3xl font-bold mb-2">南国市の条例</h1>
        <p class="text-gray-600 mb-6">DBに保存した条例リンクをタイル表示します。タイルを押すと条例サイトを開きます。</p>

        <div id="ordinance-message" class="mb-4 text-sm text-gray-600"></div>

        <section id="ordinance-admin-toolbar" class="hidden bg-white border border-indigo-100 rounded-xl p-4 mb-6 flex flex-wrap items-center gap-2">
            <button type="button" id="ordinance-edit-mode-toggle" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">編集モードにする</button>
            <button type="button" id="ordinance-new-button" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">新規追加</button>
            <span id="ordinance-mode-label" class="text-xs text-gray-600">現在: 表示モード</span>
        </section>

        <p id="ordinance-admin-message" class="mb-4 text-sm text-gray-600"></p>

        <div id="ordinance-tile-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="text-gray-500 text-sm">読み込み中です...</div>
        </div>

        <div id="ordinance-edit-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl mx-4 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 id="ordinance-edit-modal-title" class="text-lg font-bold text-gray-800">条例リンク編集</h2>
                    <button id="ordinance-edit-close" type="button" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold">閉じる</button>
                </div>
                <form id="ordinance-edit-form" class="space-y-3">
                    <input id="ordinance-edit-id" type="hidden">
                    <div>
                        <label for="ordinance-edit-title" class="block text-xs font-semibold text-gray-600">タイトル（条例名）</label>
                        <input id="ordinance-edit-title" type="text" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label for="ordinance-edit-url" class="block text-xs font-semibold text-gray-600">リンクURL</label>
                        <input id="ordinance-edit-url" type="url" required placeholder="https://..." class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label for="ordinance-edit-order" class="block text-xs font-semibold text-gray-600">表示順（小さい順）</label>
                        <input id="ordinance-edit-order" type="number" min="1" step="1" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    </div>
                    <div class="flex flex-wrap gap-2 justify-end pt-2">
                        <button type="button" id="ordinance-edit-delete" class="bg-rose-100 hover:bg-rose-200 text-rose-700 px-4 py-2 rounded-lg text-sm font-semibold">削除</button>
                        <button type="button" id="ordinance-edit-cancel" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold">キャンセル</button>
                        <button type="submit" id="ordinance-edit-save" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">保存</button>
                    </div>
                </form>
                <p id="ordinance-edit-message" class="mt-3 text-sm text-gray-600"></p>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.min.js" integrity="sha384-o+Hkm/usHFhCEWo1Ae1cLsOLiQQNrD2UfI424QDAaiZR7URnC8v35ey7s2sbGZHB" crossorigin="anonymous"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        const ORDINANCE_TABLE = "nankoku_ordinance_links";
        let ordinanceClient = null;
        let ordinanceUserEmail = "";
        let ordinanceIsAdmin = false;
        let ordinanceEditMode = false;
        let ordinanceRows = [];

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalizeHttpUrl(url) {
            const raw = String(url || "").trim();
            if (!raw) return "";

            try {
                const parsed = new URL(raw);
                if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
                    return "";
                }
                return parsed.toString();
            } catch (_error) {
                return "";
            }
        }

        function setOrdinanceMessage(text, isError = false) {
            const target = document.getElementById("ordinance-message");
            if (!target) return;
            target.className = `mb-4 text-sm ${isError ? "text-rose-700" : "text-gray-600"}`;
            target.textContent = text || "";
        }

        function setOrdinanceAdminMessage(text, isError = false) {
            const target = document.getElementById("ordinance-admin-message");
            if (!target) return;
            target.className = `mb-4 text-sm ${isError ? "text-rose-700" : "text-gray-600"}`;
            target.textContent = text || "";
        }

        function setOrdinanceEditMessage(text, isError = false) {
            const target = document.getElementById("ordinance-edit-message");
            if (!target) return;
            target.className = `mt-3 text-sm ${isError ? "text-rose-700" : "text-gray-600"}`;
            target.textContent = text || "";
        }

        function isTableMissingError(error) {
            const msg = String((error && (error.message || error.details || error.hint)) || "");
            return /does not exist|relation .* does not exist|schema cache/i.test(msg);
        }

        function updateEditModeUi() {
            const toggleButton = document.getElementById("ordinance-edit-mode-toggle");
            const newButton = document.getElementById("ordinance-new-button");
            const modeLabel = document.getElementById("ordinance-mode-label");

            if (!toggleButton || !newButton || !modeLabel) return;

            if (ordinanceEditMode) {
                toggleButton.textContent = "表示モードに戻す";
                toggleButton.className = "bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-semibold";
                newButton.classList.remove("hidden");
                modeLabel.textContent = "現在: 編集モード";
            } else {
                toggleButton.textContent = "編集モードにする";
                toggleButton.className = "bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold";
                newButton.classList.add("hidden");
                modeLabel.textContent = "現在: 表示モード";
            }
        }

        function renderOrdinanceTiles(rows) {
            const list = document.getElementById("ordinance-tile-list");
            if (!list) return;

            if (!rows || rows.length === 0) {
                list.innerHTML = '<div class="text-gray-500 text-sm">登録された条例リンクはありません。</div>';
                return;
            }

            list.innerHTML = rows.map((row) => {
                const title = escapeHtml(row.title || "（無題）");
                const url = escapeHtml(row.link_url || "");

                if (ordinanceIsAdmin && ordinanceEditMode) {
                    return `
                        <button type="button" data-ordinance-id="${row.id}" class="w-full text-left bg-amber-50 p-4 rounded-lg border border-amber-200 hover:bg-amber-100 transition">
                            <div class="text-xs font-semibold text-amber-700 mb-1">編集モード</div>
                            <div class="font-semibold text-gray-800">${title}</div>
                        </button>
                    `;
                }

                return `
                    <a href="${url}" target="_blank" rel="noopener noreferrer" class="block bg-white p-4 rounded-lg border border-gray-200 hover:bg-purple-50 transition">
                        <div class="font-semibold text-gray-800">${title}</div>
                    </a>
                `;
            }).join("");
        }

        function openOrdinanceEditModal(row) {
            const isNew = !row;
            document.getElementById("ordinance-edit-id").value = isNew ? "" : String(row.id);
            document.getElementById("ordinance-edit-title").value = isNew ? "" : (row.title || "");
            document.getElementById("ordinance-edit-url").value = isNew ? "" : (row.link_url || "");
            document.getElementById("ordinance-edit-order").value = isNew ? "100" : String(row.display_order || 100);
            document.getElementById("ordinance-edit-modal-title").textContent = isNew ? "条例リンク新規追加" : "条例リンク編集";
            document.getElementById("ordinance-edit-delete").classList.toggle("hidden", isNew);
            setOrdinanceEditMessage("");
            document.getElementById("ordinance-edit-modal").classList.remove("hidden");
        }

        function closeOrdinanceEditModal() {
            document.getElementById("ordinance-edit-modal").classList.add("hidden");
        }

        async function loadNankokuOrdinances() {
            if (!ordinanceClient) return;

            setOrdinanceMessage("読み込み中...");
            const { data, error } = await ordinanceClient
                .from(ORDINANCE_TABLE)
                .select("id,title,link_url,display_order,is_active")
                .eq("is_active", true)
                .order("display_order", { ascending: true })
                .order("title", { ascending: true });

            if (error) {
                if (isTableMissingError(error)) {
                    setOrdinanceMessage("条例リンク用テーブルが未作成です。SQL_NANKOKU_ORDINANCE_LINKS.sql を Supabase SQL Editor で実行してください。", true);
                } else {
                    setOrdinanceMessage("条例リンクの読み込みに失敗しました: " + (error.message || "unknown"), true);
                }
                ordinanceRows = [];
                renderOrdinanceTiles([]);
                return;
            }

            ordinanceRows = data || [];
            renderOrdinanceTiles(ordinanceRows);
            setOrdinanceMessage(`条例リンク ${ordinanceRows.length} 件`);
        }

        async function saveOrdinanceFromModal(event) {
            event.preventDefault();
            if (!ordinanceClient || !ordinanceIsAdmin) {
                setOrdinanceEditMessage("保存権限がありません。", true);
                return;
            }

            const saveButton = document.getElementById("ordinance-edit-save");
            const ordinanceId = String(document.getElementById("ordinance-edit-id").value || "").trim();
            const title = String(document.getElementById("ordinance-edit-title").value || "").trim();
            const linkUrl = normalizeHttpUrl(document.getElementById("ordinance-edit-url").value);
            const displayOrder = Number(document.getElementById("ordinance-edit-order").value || "");

            if (!title) {
                setOrdinanceEditMessage("タイトルを入力してください。", true);
                return;
            }
            if (!linkUrl) {
                setOrdinanceEditMessage("URLは http:// または https:// で入力してください。", true);
                return;
            }
            if (!Number.isFinite(displayOrder) || displayOrder <= 0) {
                setOrdinanceEditMessage("表示順は1以上の数値で入力してください。", true);
                return;
            }

            saveButton.disabled = true;
            setOrdinanceEditMessage("保存中...");

            let error = null;
            if (ordinanceId) {
                const result = await ordinanceClient
                    .from(ORDINANCE_TABLE)
                    .update({
                        title,
                        link_url: linkUrl,
                        display_order: Math.floor(displayOrder),
                        updated_at: new Date().toISOString()
                    })
                    .eq("id", Number(ordinanceId));
                error = result.error;
            } else {
                const result = await ordinanceClient
                    .from(ORDINANCE_TABLE)
                    .insert({
                        title,
                        link_url: linkUrl,
                        display_order: Math.floor(displayOrder),
                        is_active: true,
                        created_by_email: ordinanceUserEmail || null
                    });
                error = result.error;
            }

            saveButton.disabled = false;

            if (error) {
                setOrdinanceEditMessage("保存に失敗しました: " + (error.message || "unknown"), true);
                return;
            }

            closeOrdinanceEditModal();
            setOrdinanceAdminMessage(ordinanceId ? "更新しました。" : "追加しました。");
            await loadNankokuOrdinances();
        }

        async function deleteOrdinanceFromModal() {
            if (!ordinanceClient || !ordinanceIsAdmin) {
                setOrdinanceEditMessage("削除権限がありません。", true);
                return;
            }

            const ordinanceId = Number(document.getElementById("ordinance-edit-id").value || "0");
            if (!Number.isFinite(ordinanceId) || ordinanceId <= 0) {
                setOrdinanceEditMessage("削除対象がありません。", true);
                return;
            }

            const row = ordinanceRows.find((item) => Number(item.id) === ordinanceId);
            const ok = window.confirm(`「${row && row.title ? row.title : "（無題）"}」を削除しますか？`);
            if (!ok) return;

            const { error } = await ordinanceClient
                .from(ORDINANCE_TABLE)
                .delete()
                .eq("id", ordinanceId);

            if (error) {
                setOrdinanceEditMessage("削除に失敗しました: " + (error.message || "unknown"), true);
                return;
            }

            closeOrdinanceEditModal();
            setOrdinanceAdminMessage("削除しました。");
            await loadNankokuOrdinances();
        }

        document.getElementById("ordinance-edit-mode-toggle").addEventListener("click", () => {
            ordinanceEditMode = !ordinanceEditMode;
            updateEditModeUi();
            renderOrdinanceTiles(ordinanceRows);
            setOrdinanceAdminMessage(ordinanceEditMode ? "編集モードです。タイルを押すと編集モーダルが開きます。" : "表示モードに戻しました。");
        });

        document.getElementById("ordinance-new-button").addEventListener("click", () => {
            openOrdinanceEditModal(null);
        });

        document.getElementById("ordinance-tile-list").addEventListener("click", (event) => {
            if (!ordinanceIsAdmin || !ordinanceEditMode) {
                return;
            }

            const tile = event.target.closest("[data-ordinance-id]");
            if (!tile) return;

            event.preventDefault();
            const rowId = Number(tile.getAttribute("data-ordinance-id"));
            const row = ordinanceRows.find((item) => Number(item.id) === rowId) || null;
            if (!row) {
                setOrdinanceAdminMessage("対象データが見つかりません。", true);
                return;
            }
            openOrdinanceEditModal(row);
        });

        document.getElementById("ordinance-edit-form").addEventListener("submit", saveOrdinanceFromModal);
        document.getElementById("ordinance-edit-cancel").addEventListener("click", closeOrdinanceEditModal);
        document.getElementById("ordinance-edit-close").addEventListener("click", closeOrdinanceEditModal);
        document.getElementById("ordinance-edit-delete").addEventListener("click", deleteOrdinanceFromModal);
        document.getElementById("ordinance-edit-modal").addEventListener("click", (event) => {
            if (event.target && event.target.id === "ordinance-edit-modal") {
                closeOrdinanceEditModal();
            }
        });

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "nankoku-ordinances.html",
            onReady: async (context) => {
                ordinanceClient = context.client;
                ordinanceUserEmail = (context.session && context.session.email) || (context.profile && context.profile.email) || "";
                ordinanceIsAdmin = context.role === "admin"
                    || (context.profile && context.profile.access_role === "管理者");

                if (ordinanceIsAdmin) {
                    document.getElementById("ordinance-admin-toolbar").classList.remove("hidden");
                }

                updateEditModeUi();
                await loadNankokuOrdinances();
            }
        });
    </script>
</body>
</html>
