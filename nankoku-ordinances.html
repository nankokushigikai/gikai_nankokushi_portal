<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://cdn.quilljs.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.quilljs.com 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://gnnfzimhfizbfhvwuzbf.supabase.co wss://gnnfzimhfizbfhvwuzbf.supabase.co https://accounts.google.com https://www.googleapis.com https://calendar.google.com; worker-src blob:; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南国市の条例 | 議員ナレッジ共有</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="knowledge.html" class="text-lg font-bold hover:text-gray-200">議員ナレッジ共有</a>
            <span class="text-sm">南国市の条例</span>
        </div>
    </header>
    <main class="container mx-auto py-8 px-4">
        <div class="mb-6"><a href="knowledge.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">ナレッジトップへ戻る</a></div>
        <h1 class="text-3xl font-bold mb-2">南国市の条例</h1>
        <p class="text-gray-600 mb-6">DBに保存した条例リンクをタイル表示します。タイルを押すと条例サイトを開きます。</p>

        <div id="ordinance-message" class="mb-4 text-sm text-gray-600"></div>

        <section id="ordinance-admin-panel" class="hidden bg-white border border-indigo-100 rounded-xl p-4 mb-6">
            <h2 class="text-base font-bold text-indigo-800 mb-3">条例リンク登録/編集（管理者）</h2>
            <form id="ordinance-form" class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input id="ordinance-id" type="hidden">
                <div class="md:col-span-1">
                    <label for="ordinance-title" class="block text-xs font-semibold text-gray-600">タイトル（条例名）</label>
                    <input id="ordinance-title" type="text" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label for="ordinance-url" class="block text-xs font-semibold text-gray-600">リンクURL</label>
                    <input id="ordinance-url" type="url" required placeholder="https://..." class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="ordinance-order" class="block text-xs font-semibold text-gray-600">表示順（小さい順）</label>
                    <input id="ordinance-order" type="number" min="1" step="1" placeholder="例: 10" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div class="md:col-span-2 flex items-end gap-2">
                    <button type="submit" id="ordinance-save-button" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">保存</button>
                    <button type="button" id="ordinance-cancel-button" class="hidden bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold">編集をキャンセル</button>
                </div>
            </form>
            <p id="ordinance-admin-message" class="mt-2 text-sm text-gray-600"></p>
            <div class="mt-4 pt-3 border-t border-gray-100 flex items-center gap-2">
                <button type="button" id="ordinance-order-save-button" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed" disabled>並び順を保存</button>
                <span class="text-xs text-gray-500">管理者はタイルをドラッグして並び替えできます。</span>
            </div>
        </section>

        <div id="ordinance-tile-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="text-gray-500 text-sm">読み込み中です...</div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.min.js" integrity="sha384-o+Hkm/usHFhCEWo1Ae1cLsOLiQQNrD2UfI424QDAaiZR7URnC8v35ey7s2sbGZHB" crossorigin="anonymous"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        const ORDINANCE_TABLE = "nankoku_ordinance_links";
        let ordinanceClient = null;
        let ordinanceUserEmail = "";
        let ordinanceIsAdmin = false;
        let ordinanceRows = [];
        let draggingOrdinanceId = null;
        let ordinanceOrderDirty = false;

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalizeHttpUrl(url) {
            const raw = String(url || "").trim();
            if (!raw) return "";

            try {
                const parsed = new URL(raw);
                if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
                    return "";
                }
                return parsed.toString();
            } catch (_error) {
                return "";
            }
        }

        function setOrdinanceMessage(text, isError = false) {
            const target = document.getElementById("ordinance-message");
            if (!target) return;
            target.className = `mb-4 text-sm ${isError ? "text-rose-700" : "text-gray-600"}`;
            target.textContent = text || "";
        }

        function setOrdinanceAdminMessage(text, isError = false) {
            const target = document.getElementById("ordinance-admin-message");
            if (!target) return;
            target.className = `mt-2 text-sm ${isError ? "text-rose-700" : "text-gray-600"}`;
            target.textContent = text || "";
        }

        function isTableMissingError(error) {
            const msg = String((error && (error.message || error.details || error.hint)) || "");
            return /does not exist|relation .* does not exist|schema cache/i.test(msg);
        }

        function setOrdinanceOrderDirty(isDirty) {
            ordinanceOrderDirty = !!isDirty;
            const saveButton = document.getElementById("ordinance-order-save-button");
            if (!saveButton) return;
            saveButton.disabled = !ordinanceOrderDirty;
        }

        function clearDropHints() {
            const list = document.getElementById("ordinance-tile-list");
            if (!list) return;
            list.querySelectorAll("[data-id]").forEach((el) => {
                el.classList.remove("ring-2", "ring-indigo-300", "border-t-4", "border-t-indigo-400", "border-b-4", "border-b-indigo-400");
            });
        }

        function setDropHint(targetCard, placeAfter) {
            clearDropHints();
            if (!targetCard) return;
            targetCard.classList.add("ring-2", "ring-indigo-300");
            if (placeAfter) {
                targetCard.classList.add("border-b-4", "border-b-indigo-400");
            } else {
                targetCard.classList.add("border-t-4", "border-t-indigo-400");
            }
        }

        function renderOrdinanceTiles(rows) {
            const list = document.getElementById("ordinance-tile-list");
            if (!list) return;

            if (!rows || rows.length === 0) {
                list.innerHTML = '<div class="text-gray-500 text-sm">登録された条例リンクはありません。</div>';
                return;
            }

            list.innerHTML = rows.map((row) => {
                const title = escapeHtml(row.title || "（無題）");
                const url = escapeHtml(row.link_url || "");
                const adminActions = ordinanceIsAdmin
                    ? `
                        <div class="mt-2 flex gap-2">
                            <button type="button" data-action="edit" data-id="${row.id}" class="text-xs px-2 py-1 rounded bg-indigo-50 hover:bg-indigo-100 text-indigo-700">編集</button>
                            <button type="button" data-action="delete" data-id="${row.id}" class="text-xs px-2 py-1 rounded bg-rose-50 hover:bg-rose-100 text-rose-700">削除</button>
                        </div>
                    `
                    : "";
                const dragHandle = ordinanceIsAdmin
                    ? '<div class="text-xs text-gray-400 mb-2 select-none">並び替え: ドラッグ</div>'
                    : "";
                const draggable = ordinanceIsAdmin ? "true" : "false";
                return `
                    <div data-id="${row.id}" draggable="${draggable}" class="bg-white p-4 rounded-lg border border-gray-200 transition ${ordinanceIsAdmin ? "cursor-grab active:cursor-grabbing" : ""}">
                        ${dragHandle}
                        <a href="${url}" target="_blank" rel="noopener noreferrer" class="block hover:bg-purple-50 rounded">
                            <div class="font-semibold text-gray-800">${title}</div>
                            <div class="mt-1 text-xs text-gray-500 break-all">${url}</div>
                        </a>
                        ${adminActions}
                    </div>
                `;
            }).join("");
        }

        function reorderOrdinanceRowsByDom() {
            const list = document.getElementById("ordinance-tile-list");
            if (!list) return;

            const orderIds = Array.from(list.querySelectorAll("[data-id]"))
                .map((el) => Number(el.getAttribute("data-id")))
                .filter((id) => Number.isFinite(id));

            if (orderIds.length !== ordinanceRows.length) {
                return;
            }

            const mapById = new Map(ordinanceRows.map((row) => [Number(row.id), row]));
            ordinanceRows = orderIds.map((id) => mapById.get(id)).filter(Boolean);
        }

        async function saveOrdinanceOrder() {
            if (!ordinanceClient || !ordinanceIsAdmin) {
                setOrdinanceAdminMessage("並び順保存の権限がありません。", true);
                return;
            }

            if (!ordinanceOrderDirty) {
                setOrdinanceAdminMessage("並び順の変更はありません。");
                return;
            }

            const saveButton = document.getElementById("ordinance-order-save-button");
            saveButton.disabled = true;
            setOrdinanceAdminMessage("並び順を保存中...");

            const updates = ordinanceRows.map((row, index) => ({
                id: Number(row.id),
                display_order: (index + 1) * 10,
                updated_at: new Date().toISOString()
            }));

            for (const updateRow of updates) {
                const { error } = await ordinanceClient
                    .from(ORDINANCE_TABLE)
                    .update({
                        display_order: updateRow.display_order,
                        updated_at: updateRow.updated_at
                    })
                    .eq("id", updateRow.id);

                if (error) {
                    setOrdinanceAdminMessage("並び順の保存に失敗しました: " + (error.message || "unknown"), true);
                    setOrdinanceOrderDirty(true);
                    return;
                }
            }

            setOrdinanceAdminMessage("並び順を保存しました。");
            setOrdinanceOrderDirty(false);
            await loadNankokuOrdinances();
        }

        function resetOrdinanceForm() {
            document.getElementById("ordinance-form").reset();
            document.getElementById("ordinance-id").value = "";
            document.getElementById("ordinance-save-button").textContent = "保存";
            document.getElementById("ordinance-cancel-button").classList.add("hidden");
        }

        function startOrdinanceEdit(rowId) {
            const row = ordinanceRows.find((item) => Number(item.id) === Number(rowId));
            if (!row) {
                setOrdinanceAdminMessage("対象データが見つかりません。", true);
                return;
            }

            document.getElementById("ordinance-id").value = String(row.id);
            document.getElementById("ordinance-title").value = row.title || "";
            document.getElementById("ordinance-url").value = row.link_url || "";
            document.getElementById("ordinance-order").value = String(row.display_order || 100);
            document.getElementById("ordinance-save-button").textContent = "更新";
            document.getElementById("ordinance-cancel-button").classList.remove("hidden");
            setOrdinanceAdminMessage(`編集中: ${row.title || "（無題）"}`);
        }

        async function deleteOrdinance(rowId) {
            if (!ordinanceClient || !ordinanceIsAdmin) {
                setOrdinanceAdminMessage("削除権限がありません。", true);
                return;
            }

            const row = ordinanceRows.find((item) => Number(item.id) === Number(rowId));
            if (!row) {
                setOrdinanceAdminMessage("対象データが見つかりません。", true);
                return;
            }

            const ok = window.confirm(`「${row.title || "（無題）"}」を削除しますか？`);
            if (!ok) return;

            setOrdinanceAdminMessage("削除中...");
            const { error } = await ordinanceClient
                .from(ORDINANCE_TABLE)
                .delete()
                .eq("id", Number(rowId));

            if (error) {
                setOrdinanceAdminMessage("削除に失敗しました: " + (error.message || "unknown"), true);
                return;
            }

            setOrdinanceAdminMessage("削除しました。");
            resetOrdinanceForm();
            await loadNankokuOrdinances();
        }

        async function loadNankokuOrdinances() {
            if (!ordinanceClient) return;

            setOrdinanceMessage("読み込み中...");
            const { data, error } = await ordinanceClient
                .from(ORDINANCE_TABLE)
                .select("id,title,link_url,display_order,is_active")
                .eq("is_active", true)
                .order("display_order", { ascending: true })
                .order("title", { ascending: true });

            if (error) {
                if (isTableMissingError(error)) {
                    setOrdinanceMessage("条例リンク用テーブルが未作成です。SQL_NANKOKU_ORDINANCE_LINKS.sql を Supabase SQL Editor で実行してください。", true);
                } else {
                    setOrdinanceMessage("条例リンクの読み込みに失敗しました: " + (error.message || "unknown"), true);
                }
                renderOrdinanceTiles([]);
                ordinanceRows = [];
                return;
            }

            ordinanceRows = data || [];
            renderOrdinanceTiles(ordinanceRows);
            setOrdinanceMessage(`条例リンク ${data ? data.length : 0} 件`);
            setOrdinanceOrderDirty(false);
        }

        async function saveNankokuOrdinance(event) {
            event.preventDefault();
            if (!ordinanceClient || !ordinanceIsAdmin) {
                setOrdinanceAdminMessage("保存権限がありません。", true);
                return;
            }

            const saveButton = document.getElementById("ordinance-save-button");
            const ordinanceId = String(document.getElementById("ordinance-id").value || "").trim();
            const title = String(document.getElementById("ordinance-title").value || "").trim();
            const urlInput = document.getElementById("ordinance-url").value;
            const linkUrl = normalizeHttpUrl(urlInput);
            const orderInput = String(document.getElementById("ordinance-order").value || "").trim();
            const displayOrder = orderInput ? Number(orderInput) : 100;

            if (!title) {
                setOrdinanceAdminMessage("タイトルを入力してください。", true);
                return;
            }

            if (!linkUrl) {
                setOrdinanceAdminMessage("URLは http:// または https:// で入力してください。", true);
                return;
            }

            if (!Number.isFinite(displayOrder) || displayOrder <= 0) {
                setOrdinanceAdminMessage("表示順は1以上の数値で入力してください。", true);
                return;
            }

            saveButton.disabled = true;
            setOrdinanceAdminMessage("保存中...");

            let error = null;
            if (ordinanceId) {
                const result = await ordinanceClient
                    .from(ORDINANCE_TABLE)
                    .update({
                        title,
                        link_url: linkUrl,
                        display_order: Math.floor(displayOrder),
                        updated_at: new Date().toISOString()
                    })
                    .eq("id", Number(ordinanceId));
                error = result.error;
            } else {
                const result = await ordinanceClient
                    .from(ORDINANCE_TABLE)
                    .insert({
                        title,
                        link_url: linkUrl,
                        display_order: Math.floor(displayOrder),
                        is_active: true,
                        created_by_email: ordinanceUserEmail || null
                    });
                error = result.error;
            }

            saveButton.disabled = false;

            if (error) {
                setOrdinanceAdminMessage("保存に失敗しました: " + (error.message || "unknown"), true);
                return;
            }

            resetOrdinanceForm();
            setOrdinanceAdminMessage(ordinanceId ? "更新しました。" : "保存しました。");
            await loadNankokuOrdinances();
        }

        document.getElementById("ordinance-form").addEventListener("submit", saveNankokuOrdinance);
        document.getElementById("ordinance-cancel-button").addEventListener("click", () => {
            resetOrdinanceForm();
            setOrdinanceAdminMessage("編集をキャンセルしました。");
        });

        document.getElementById("ordinance-order-save-button").addEventListener("click", saveOrdinanceOrder);

        document.getElementById("ordinance-tile-list").addEventListener("dragstart", (event) => {
            if (!ordinanceIsAdmin) return;
            const card = event.target.closest("[data-id]");
            if (!card) return;
            draggingOrdinanceId = Number(card.getAttribute("data-id"));
            if (event.dataTransfer) {
                event.dataTransfer.effectAllowed = "move";
                event.dataTransfer.setData("text/plain", String(draggingOrdinanceId));
            }
            card.classList.add("opacity-60", "ring-2", "ring-indigo-300");
        });

        document.getElementById("ordinance-tile-list").addEventListener("dragend", (event) => {
            const card = event.target.closest("[data-id]");
            if (card) {
                card.classList.remove("opacity-60", "ring-2", "ring-indigo-300");
            }
            clearDropHints();
            draggingOrdinanceId = null;
        });

        document.getElementById("ordinance-tile-list").addEventListener("dragover", (event) => {
            if (!ordinanceIsAdmin) return;
            event.preventDefault();
            if (event.dataTransfer) {
                event.dataTransfer.dropEffect = "move";
            }

            const targetCard = event.target.closest("[data-id]");
            if (!targetCard || !Number.isFinite(draggingOrdinanceId)) {
                clearDropHints();
                return;
            }

            const targetId = Number(targetCard.getAttribute("data-id"));
            if (!Number.isFinite(targetId) || targetId === draggingOrdinanceId) {
                clearDropHints();
                return;
            }

            const targetRect = targetCard.getBoundingClientRect();
            const placeAfter = event.clientY > targetRect.top + targetRect.height / 2;
            setDropHint(targetCard, placeAfter);
        });

        document.getElementById("ordinance-tile-list").addEventListener("drop", (event) => {
            if (!ordinanceIsAdmin) return;
            event.preventDefault();

            const targetCard = event.target.closest("[data-id]");
            const list = document.getElementById("ordinance-tile-list");
            if (!targetCard || !list || !Number.isFinite(draggingOrdinanceId)) {
                return;
            }

            const targetId = Number(targetCard.getAttribute("data-id"));
            if (!Number.isFinite(targetId) || targetId === draggingOrdinanceId) {
                clearDropHints();
                return;
            }

            const draggingCard = list.querySelector(`[data-id="${draggingOrdinanceId}"]`);
            if (!draggingCard) return;

            const targetRect = targetCard.getBoundingClientRect();
            const placeAfter = event.clientY > targetRect.top + targetRect.height / 2;
            if (placeAfter) {
                targetCard.after(draggingCard);
            } else {
                targetCard.before(draggingCard);
            }

            clearDropHints();
            reorderOrdinanceRowsByDom();
            setOrdinanceOrderDirty(true);
            setOrdinanceAdminMessage("並び順を変更しました。『並び順を保存』を押してください。");
        });

        document.getElementById("ordinance-tile-list").addEventListener("click", async (event) => {
            const actionButton = event.target.closest("button[data-action]");
            if (!actionButton) return;

            event.preventDefault();
            event.stopPropagation();

            const action = actionButton.getAttribute("data-action");
            const rowId = actionButton.getAttribute("data-id");
            if (!rowId) return;

            if (action === "edit") {
                startOrdinanceEdit(rowId);
            } else if (action === "delete") {
                await deleteOrdinance(rowId);
            }
        });

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "nankoku-ordinances.html",
            onReady: async (context) => {
                ordinanceClient = context.client;
                ordinanceUserEmail = (context.session && context.session.email) || (context.profile && context.profile.email) || "";
                ordinanceIsAdmin = context.role === "admin"
                    || (context.profile && context.profile.access_role === "管理者");

                if (ordinanceIsAdmin) {
                    document.getElementById("ordinance-admin-panel").classList.remove("hidden");
                }

                await loadNankokuOrdinances();
            }
        });
    </script>
</body>
</html>
