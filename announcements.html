<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ一覧 | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
            </a>
            <div class="text-right">
                <span class="text-sm">お知らせ一覧</span>
                <div id="authArea"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6 flex flex-wrap gap-3">
            <a href="index.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>ポータルに戻る
            </a>
            <a href="announcement-register.html" class="text-rose-700 hover:text-rose-900 text-sm font-semibold">
                <i class="fas fa-pen-to-square mr-1"></i>お知らせを登録する
            </a>
        </div>

        <section class="bg-white rounded-xl shadow-sm p-6 border-t-4 border-rose-500">
            <h1 class="text-2xl font-bold mb-2 text-gray-700">お知らせ一覧</h1>
            <p class="text-sm text-gray-600 mb-4">過去のお知らせを含めて、新しい順に表示します。</p>

            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="text-left p-2 border">日付</th>
                            <th class="text-left p-2 border">時間</th>
                            <th class="text-left p-2 border">タイトル</th>
                            <th class="text-left p-2 border">内容</th>
                            <th class="text-left p-2 border">登録者</th>
                        </tr>
                    </thead>
                    <tbody id="announcement-list">
                        <tr>
                            <td class="p-2 border text-gray-500" colspan="5">読み込み中です...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p id="announcement-message" class="mt-3 text-sm text-gray-600"></p>
        </section>
    </main>

    <footer class="mt-12 py-6 text-center text-gray-400 text-xs">
        &copy; 2026 南国市議会DX推進プロジェクト - 未来の自治体をつくる
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let dbClient = null;

        function formatDate(dateValue) {
            if (!dateValue) return "";
            const parts = String(dateValue).split("-");
            if (parts.length !== 3) return String(dateValue);
            return `${parts[0]}/${parts[1]}/${parts[2]}`;
        }

        function formatTimeRange(startTime, endTime) {
            const start = startTime ? String(startTime).slice(0, 5) : "--:--";
            const end = endTime ? String(endTime).slice(0, 5) : "--:--";
            return `${start} - ${end}`;
        }

        async function loadAnnouncements() {
            const tbody = document.getElementById("announcement-list");
            const message = document.getElementById("announcement-message");
            tbody.innerHTML = "";
            message.textContent = "";

            const { data, error } = await dbClient
                .from("announcements")
                .select("notice_date,start_time,end_time,title,content,owner_name,no")
                .order("notice_date", { ascending: false })
                .order("start_time", { ascending: false })
                .order("no", { ascending: false });

            if (error) {
                message.textContent = "一覧読込失敗: " + error.message;
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="5">データを表示できませんでした。</td></tr>';
                return;
            }

            const rows = data || [];
            if (rows.length === 0) {
                tbody.innerHTML = '<tr><td class="p-2 border text-gray-500" colspan="5">お知らせはありません。</td></tr>';
                return;
            }

            rows.forEach((item) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="p-2 border">${formatDate(item.notice_date)}</td>
                    <td class="p-2 border">${formatTimeRange(item.start_time, item.end_time)}</td>
                    <td class="p-2 border">${item.title || ""}</td>
                    <td class="p-2 border">${item.content || ""}</td>
                    <td class="p-2 border">${item.owner_name || "未設定"}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            authTargetId: "authArea",
            hideDisplayName: true,
            returnTo: "announcements.html",
            onReady: async ({ client }) => {
                dbClient = client;
                await loadAnnouncements();
            }
        });
    </script>
</body>
</html>
