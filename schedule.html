<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://gnnfzimhfizbfhvwuzbf.supabase.co wss://gnnfzimhfizbfhvwuzbf.supabase.co; worker-src blob:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日程調整 | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha384-3B6NwesSXE7YJlcLI9RpRqGf2p/EgVH8BgoKTaUrmKNDkHPStTQ3EyoYjCGXaOTS" crossorigin="anonymous">
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-lg font-bold font-sans tracking-wider hover:text-gray-200">
                <i class="fas fa-laptop-code mr-2"></i>南国市議会DXポータル
            </a>
            <div class="text-right">
                <span class="text-sm">日程調整</span>
                <div id="authArea"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4">
        <div class="mb-6">
            <a href="index.html" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                <i class="fas fa-chevron-left mr-1"></i>ポータルトップに戻る
            </a>
        </div>

        <section class="rounded-2xl p-6 md:p-8 bg-gradient-to-r from-pink-600 to-indigo-700 text-white shadow-lg mb-8 flex items-center justify-between flex-wrap gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold mb-1">日程調整</h1>
                <p class="text-pink-100">日程候補を提示してメンバーの参加可否を○△×で集計します。</p>
            </div>
            <button id="new-event-btn" class="bg-white text-indigo-700 hover:bg-indigo-50 font-bold px-5 py-2 rounded-lg shadow text-sm">
                <i class="fas fa-plus mr-1"></i>新規作成
            </button>
        </section>

        <!-- イベント一覧 -->
        <section id="event-list-section">
            <p id="event-list-message" class="text-sm text-gray-500 mb-4 hidden"></p>
            <div id="event-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <!-- イベント詳細 -->
        <section id="event-detail-section" class="hidden">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                <button id="back-to-list-btn" class="text-indigo-700 hover:text-indigo-900 text-sm font-semibold">
                    <i class="fas fa-chevron-left mr-1"></i>一覧に戻る
                </button>
                <div class="flex gap-2" id="detail-admin-buttons">
                    <button id="detail-edit-btn" class="hidden bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold">
                        <i class="fas fa-edit mr-1"></i>編集
                    </button>
                    <button id="detail-close-btn-admin" class="hidden bg-amber-500 hover:bg-amber-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold">
                        <i class="fas fa-lock mr-1"></i>締め切る
                    </button>
                    <button id="detail-delete-btn" class="hidden bg-red-500 hover:bg-red-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold">
                        <i class="fas fa-trash mr-1"></i>削除
                    </button>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                <h2 id="detail-title" class="text-2xl font-bold text-gray-800 mb-1"></h2>
                <p id="detail-description" class="text-sm text-gray-600 mb-2"></p>
                <div class="flex flex-wrap gap-3 text-xs text-gray-500">
                    <span id="detail-deadline"></span>
                    <span id="detail-creator"></span>
                    <span id="detail-status"></span>
                    <span id="detail-recipients-info"></span>
                </div>
            </div>

            <p id="detail-message" class="text-sm mb-3 hidden"></p>

            <!-- 回答マトリクス -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6 overflow-x-auto">
                <div id="response-matrix"></div>
            </div>

            <!-- 自分の回答フォーム -->
            <div id="my-response-form" class="bg-indigo-50 border border-indigo-200 rounded-xl p-5">
                <h3 class="font-bold text-indigo-800 mb-3"><i class="fas fa-pen mr-1"></i>自分の回答を入力</h3>
                <div id="my-response-slots" class="space-y-2"></div>
                <button id="save-response-btn" class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-semibold">
                    <i class="fas fa-save mr-1"></i>回答を保存
                </button>
                <p id="response-message" class="text-sm mt-2 hidden"></p>
            </div>
        </section>
    </main>

    <!-- 新規作成モーダル -->
    <div id="create-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 max-h-[90vh] flex flex-col">
            <div class="p-5 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800">新規日程調整を作成</h2>
                <button id="create-modal-close" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 space-y-4">
                <div>
                    <label class="text-sm font-semibold text-gray-700">タイトル <span class="text-red-500">*</span></label>
                    <input id="create-title" type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="例: 6月定例会日程調整">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">説明（任意）</label>
                    <textarea id="create-description" rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="補足説明があれば入力"></textarea>
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">回答期限（任意）</label>
                    <input id="create-deadline" type="date" class="mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700 block mb-2">日程候補 <span class="text-red-500">*</span></label>
                    <div id="slot-inputs" class="space-y-2"></div>
                    <button id="add-slot-btn" type="button" class="mt-2 text-indigo-600 hover:text-indigo-800 text-sm font-semibold">
                        <i class="fas fa-plus mr-1"></i>候補を追加
                    </button>
                </div>
                <!-- 対象者 -->
                <div class="rounded-lg border border-blue-200 bg-blue-50 p-4">
                    <label class="text-sm font-semibold text-blue-800 block mb-2">対象者</label>
                    <div class="flex gap-4 mb-3">
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="radio" name="create-visibility" value="all" checked class="w-4 h-4"> 全員
                        </label>
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="radio" name="create-visibility" value="specific" class="w-4 h-4"> 特定のメンバーのみ
                        </label>
                    </div>
                    <div id="create-members-section" class="hidden">
                        <div id="create-member-list" class="border border-gray-300 rounded-lg p-3 max-h-40 overflow-y-auto bg-white">
                            <p class="text-xs text-gray-400">読み込み中...</p>
                        </div>
                    </div>
                </div>
                <p id="create-message" class="text-sm text-red-600 hidden"></p>
            </div>
            <div class="p-5 border-t border-gray-200 flex justify-end gap-3">
                <button id="create-cancel-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold">キャンセル</button>
                <button id="create-save-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-semibold">作成</button>
            </div>
        </div>
    </div>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 max-h-[90vh] flex flex-col">
            <div class="p-5 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800">日程調整を編集</h2>
                <button id="edit-modal-close" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 space-y-4">
                <div>
                    <label class="text-sm font-semibold text-gray-700">タイトル <span class="text-red-500">*</span></label>
                    <input id="edit-title" type="text" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">説明（任意）</label>
                    <textarea id="edit-description" rows="2" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea>
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700">回答期限（任意）</label>
                    <input id="edit-deadline" type="date" class="mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700 block mb-2">日程候補</label>
                    <div id="edit-slot-inputs" class="space-y-2 mb-2"></div>
                    <button id="edit-add-slot-btn" type="button" class="text-indigo-600 hover:text-indigo-800 text-sm font-semibold">
                        <i class="fas fa-plus mr-1"></i>候補を追加
                    </button>
                </div>
                <div class="rounded-lg border border-blue-200 bg-blue-50 p-4">
                    <label class="text-sm font-semibold text-blue-800 block mb-2">対象者</label>
                    <div class="flex gap-4 mb-3">
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="radio" name="edit-visibility" value="all" class="w-4 h-4"> 全員
                        </label>
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="radio" name="edit-visibility" value="specific" class="w-4 h-4"> 特定のメンバーのみ
                        </label>
                    </div>
                    <div id="edit-members-section" class="hidden">
                        <div id="edit-member-list" class="border border-gray-300 rounded-lg p-3 max-h-40 overflow-y-auto bg-white">
                            <p class="text-xs text-gray-400">読み込み中...</p>
                        </div>
                    </div>
                </div>
                <p id="edit-message" class="text-sm text-red-600 hidden"></p>
            </div>
            <div class="p-5 border-t border-gray-200 flex justify-end gap-3">
                <button id="edit-cancel-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold">キャンセル</button>
                <button id="edit-save-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-semibold">保存</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.min.js" integrity="sha384-o+Hkm/usHFhCEWo1Ae1cLsOLiQQNrD2UfI424QDAaiZR7URnC8v35ey7s2sbGZHB" crossorigin="anonymous"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let dbClient = null;
        let currentUser = { email: "", name: "" };
        let currentEventId = null;
        let currentSlots = [];
        let currentResponses = [];
        let myPendingResponses = {};
        let allMembers = [];

        const RESPONSE_LABELS = { circle: "○", triangle: "△", cross: "×" };
        const RESPONSE_COLORS = {
            circle:   "bg-emerald-100 text-emerald-700 border-emerald-300",
            triangle: "bg-amber-100 text-amber-700 border-amber-300",
            cross:    "bg-red-100 text-red-600 border-red-300",
            none:     "bg-gray-100 text-gray-400 border-gray-300"
        };

        function escapeHtml(v) {
            return String(v || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        function formatDate(d) {
            if (!d) return "";
            const [y,m,day] = String(d).split("-");
            const dt = new Date(Number(y), Number(m)-1, Number(day));
            const days = ["日","月","火","水","木","金","土"];
            return `${y}/${m}/${day}（${days[dt.getDay()]}）`;
        }

        function formatSlotLabel(slot) {
            const date = formatDate(slot.slot_date);
            if (!slot.slot_start) return date;
            const start = String(slot.slot_start).slice(0, 5);
            const end = slot.slot_end ? "〜" + String(slot.slot_end).slice(0, 5) : "";
            return `${date} ${start}${end}`;
        }

        async function loadMembers() {
            const { data } = await dbClient
                .from("member_directory")
                .select("email,full_name")
                .eq("is_current", true)
                .order("seat_number", { ascending: true, nullsFirst: false });
            allMembers = data || [];
        }

        // ---- イベント一覧 ----
        async function loadEvents() {
            // visibility='all' のイベントと自分が対象のイベントを取得
            const [evAll, myRecipients] = await Promise.all([
                dbClient.from("schedule_events")
                    .select("id,title,description,deadline,is_closed,created_by_name,created_by_email,visibility,created_at")
                    .eq("visibility", "all")
                    .order("created_at", { ascending: false }),
                dbClient.from("schedule_recipients")
                    .select("event_id")
                    .eq("member_email", currentUser.email)
            ]);

            const specificIds = (myRecipients.data || []).map(r => r.event_id);
            let specificEvents = [];
            if (specificIds.length > 0) {
                const { data } = await dbClient
                    .from("schedule_events")
                    .select("id,title,description,deadline,is_closed,created_by_name,created_by_email,visibility,created_at")
                    .in("id", specificIds)
                    .order("created_at", { ascending: false });
                specificEvents = data || [];
            }

            const seen = new Set();
            const events = [];
            [...(evAll.data || []), ...specificEvents].forEach(ev => {
                if (!seen.has(ev.id)) { seen.add(ev.id); events.push(ev); }
            });
            events.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

            const container = document.getElementById("event-list");
            const msg = document.getElementById("event-list-message");

            if (events.length === 0) {
                msg.textContent = "まだ日程調整がありません。「新規作成」ボタンから作成してください。";
                msg.classList.remove("hidden");
                container.innerHTML = "";
                return;
            }
            msg.classList.add("hidden");
            container.innerHTML = events.map(ev => {
                const deadlineText = ev.deadline ? `回答期限: ${formatDate(ev.deadline)}` : "";
                const statusBadge = ev.is_closed
                    ? `<span class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full">締め切り済み</span>`
                    : `<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">受付中</span>`;
                const targetBadge = ev.visibility === "specific"
                    ? `<span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full ml-1">指定対象</span>` : "";
                return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 cursor-pointer hover:shadow-md hover:-translate-y-0.5 transition event-card"
                     data-event-id="${ev.id}">
                    <div class="flex items-start justify-between mb-2 gap-2 flex-wrap">
                        <h3 class="font-bold text-gray-800 text-base leading-snug">${escapeHtml(ev.title)}</h3>
                        <div>${statusBadge}${targetBadge}</div>
                    </div>
                    ${ev.description ? `<p class="text-xs text-gray-500 mb-2">${escapeHtml(ev.description)}</p>` : ""}
                    <div class="text-xs text-gray-400 space-y-0.5">
                        ${deadlineText ? `<div><i class="fas fa-clock mr-1"></i>${deadlineText}</div>` : ""}
                        <div><i class="fas fa-user mr-1"></i>作成: ${escapeHtml(ev.created_by_name || ev.created_by_email || "")}</div>
                    </div>
                </div>`;
            }).join("");

            container.querySelectorAll(".event-card").forEach(card => {
                card.addEventListener("click", () => openEventDetail(Number(card.dataset.eventId)));
            });
        }

        // ---- イベント詳細 ----
        async function openEventDetail(eventId) {
            currentEventId = eventId;
            myPendingResponses = {};

            const [evRes, slotsRes, respRes, recipRes] = await Promise.all([
                dbClient.from("schedule_events").select("*").eq("id", eventId).single(),
                dbClient.from("schedule_slots").select("*").eq("event_id", eventId).order("sort_order").order("slot_date").order("slot_start"),
                dbClient.from("schedule_responses").select("*").eq("event_id", eventId),
                dbClient.from("schedule_recipients").select("member_email").eq("event_id", eventId)
            ]);

            if (evRes.error || !evRes.data) { alert("イベントの読み込みに失敗しました。"); return; }
            const ev = evRes.data;
            currentSlots = slotsRes.data || [];
            currentResponses = respRes.data || [];
            const recipients = (recipRes.data || []).map(r => r.member_email);

            document.getElementById("detail-title").textContent = ev.title;
            document.getElementById("detail-description").textContent = ev.description || "";
            document.getElementById("detail-deadline").textContent = ev.deadline ? "回答期限: " + formatDate(ev.deadline) : "";
            document.getElementById("detail-creator").textContent = "作成者: " + (ev.created_by_name || ev.created_by_email || "");
            document.getElementById("detail-status").innerHTML = ev.is_closed
                ? `<span class="bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full text-xs">締め切り済み</span>`
                : `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-xs">受付中</span>`;
            document.getElementById("detail-recipients-info").textContent =
                ev.visibility === "specific" ? `対象: ${recipients.length}名` : "対象: 全員";

            const isCreator = ev.created_by_email === currentUser.email;
            editCurrentEvent = ev;
            document.getElementById("detail-edit-btn").classList.toggle("hidden", !isCreator || ev.is_closed);
            document.getElementById("detail-delete-btn").classList.toggle("hidden", !isCreator);
            document.getElementById("detail-close-btn-admin").classList.toggle("hidden", !isCreator || ev.is_closed);

            renderMatrix();
            renderMyResponseForm(ev.is_closed);

            document.getElementById("event-list-section").classList.add("hidden");
            document.getElementById("event-detail-section").classList.remove("hidden");
            window.scrollTo(0, 0);
        }

        function renderMatrix() {
            const container = document.getElementById("response-matrix");
            if (currentSlots.length === 0) {
                container.innerHTML = "<p class='text-sm text-gray-500'>日程候補がありません。</p>";
                return;
            }

            const respondersMap = new Map();
            currentResponses.forEach(r => {
                if (!respondersMap.has(r.member_email)) respondersMap.set(r.member_email, r.member_name || r.member_email);
            });
            const responders = Array.from(respondersMap.entries());

            const counts = {};
            currentSlots.forEach(s => { counts[s.id] = { circle: 0, triangle: 0, cross: 0 }; });
            currentResponses.forEach(r => {
                if (counts[r.slot_id]) counts[r.slot_id][r.response] = (counts[r.slot_id][r.response] || 0) + 1;
            });

            const thClass = "px-3 py-2 text-xs font-semibold text-center whitespace-nowrap";
            const tdClass = "px-3 py-2 text-center text-sm";

            let html = `<table class="w-full border-collapse text-sm">
                <thead>
                    <tr class="border-b-2 border-gray-300">
                        <th class="${thClass} text-left text-gray-700 min-w-[100px]">氏名</th>
                        ${currentSlots.map(s => `<th class="${thClass} text-gray-700">${escapeHtml(formatSlotLabel(s))}</th>`).join("")}
                    </tr>
                </thead>
                <tbody>`;

            responders.forEach(([email, name]) => {
                const isMe = email === currentUser.email;
                html += `<tr class="border-b border-gray-100 ${isMe ? "bg-indigo-50" : ""}">
                    <td class="${tdClass} text-left font-semibold text-gray-700">${escapeHtml(name)}${isMe ? ` <span class='text-xs text-indigo-500'>（自分）</span>` : ""}</td>
                    ${currentSlots.map(s => {
                        const resp = currentResponses.find(r => r.member_email === email && r.slot_id === s.id);
                        const val = resp ? resp.response : "none";
                        const label = val === "none" ? "-" : RESPONSE_LABELS[val];
                        const cls = RESPONSE_COLORS[val] || RESPONSE_COLORS.none;
                        return `<td class="${tdClass}"><span class="inline-block px-2 py-0.5 rounded border text-xs font-bold ${cls}">${label}</span></td>`;
                    }).join("")}
                </tr>`;
            });

            if (responders.length === 0) {
                html += `<tr><td colspan="${currentSlots.length + 1}" class="${tdClass} text-gray-400">まだ回答がありません。</td></tr>`;
            }

            html += `<tr class="border-t-2 border-gray-300 bg-gray-50">
                <td class="${tdClass} text-left font-bold text-gray-700">集計</td>
                ${currentSlots.map(s => {
                    const c = counts[s.id];
                    return `<td class="${tdClass}">
                        <div class="flex flex-col items-center gap-0.5 text-xs">
                            <span class="text-emerald-600 font-bold">○ ${c.circle}</span>
                            <span class="text-amber-600 font-bold">△ ${c.triangle}</span>
                            <span class="text-red-500 font-bold">× ${c.cross}</span>
                        </div>
                    </td>`;
                }).join("")}
            </tr></tbody></table>`;

            container.innerHTML = html;
        }

        function renderMyResponseForm(isClosed) {
            const form = document.getElementById("my-response-form");
            if (isClosed) { form.classList.add("hidden"); return; }
            form.classList.remove("hidden");

            const myExisting = {};
            currentResponses.filter(r => r.member_email === currentUser.email).forEach(r => {
                myExisting[r.slot_id] = r.response;
                myPendingResponses[r.slot_id] = r.response;
            });

            const slotsDiv = document.getElementById("my-response-slots");
            slotsDiv.innerHTML = currentSlots.map(s => {
                const current = myExisting[s.id] || "";
                return `<div class="flex items-center gap-3 flex-wrap py-1">
                    <span class="text-sm text-gray-700 min-w-[220px]">${escapeHtml(formatSlotLabel(s))}</span>
                    <div class="flex gap-2">
                        ${["circle","triangle","cross"].map(val => {
                            const active = current === val;
                            const cls = active ? RESPONSE_COLORS[val] + " ring-2 ring-offset-1 ring-indigo-400" : "bg-white text-gray-500 border-gray-300 hover:bg-gray-50";
                            return `<button class="response-btn px-3 py-1 rounded border text-sm font-bold cursor-pointer transition ${cls}" data-slot-id="${s.id}" data-value="${val}">${RESPONSE_LABELS[val]}</button>`;
                        }).join("")}
                    </div>
                </div>`;
            }).join("");

            slotsDiv.querySelectorAll(".response-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const slotId = Number(btn.dataset.slotId);
                    const val = btn.dataset.value;
                    myPendingResponses[slotId] = val;
                    slotsDiv.querySelectorAll(`.response-btn[data-slot-id="${slotId}"]`).forEach(b => {
                        const isActive = b.dataset.value === val;
                        b.className = `response-btn px-3 py-1 rounded border text-sm font-bold cursor-pointer transition ${isActive ? RESPONSE_COLORS[b.dataset.value] + " ring-2 ring-offset-1 ring-indigo-400" : "bg-white text-gray-500 border-gray-300 hover:bg-gray-50"}`;
                    });
                });
            });
        }

        document.getElementById("save-response-btn").addEventListener("click", async () => {
            if (!currentEventId) return;
            const slotIds = Object.keys(myPendingResponses);
            if (slotIds.length === 0) { showResponseMsg("回答を選択してください。", true); return; }

            const upsertData = slotIds.map(slotId => ({
                event_id: currentEventId,
                slot_id: Number(slotId),
                member_email: currentUser.email,
                member_name: currentUser.name || currentUser.email,
                response: myPendingResponses[slotId],
                updated_at: new Date().toISOString()
            }));

            const { error } = await dbClient.from("schedule_responses")
                .upsert(upsertData, { onConflict: "slot_id,member_email" });

            if (error) { showResponseMsg("保存に失敗しました: " + error.message, true); return; }
            showResponseMsg("回答を保存しました。", false);
            await openEventDetail(currentEventId);
        });

        function showResponseMsg(text, isError) {
            const el = document.getElementById("response-message");
            el.textContent = text;
            el.className = `text-sm mt-2 ${isError ? "text-red-600" : "text-green-600"}`;
            el.classList.remove("hidden");
            setTimeout(() => el.classList.add("hidden"), 4000);
        }

        document.getElementById("back-to-list-btn").addEventListener("click", () => {
            document.getElementById("event-detail-section").classList.add("hidden");
            document.getElementById("event-list-section").classList.remove("hidden");
            currentEventId = null;
            loadEvents();
        });

        document.getElementById("detail-close-btn-admin").addEventListener("click", async () => {
            if (!confirm("この日程調整を締め切りますか？")) return;
            const { error } = await dbClient.from("schedule_events")
                .update({ is_closed: true, updated_at: new Date().toISOString() }).eq("id", currentEventId);
            if (error) { alert("失敗: " + error.message); return; }
            await openEventDetail(currentEventId);
        });

        document.getElementById("detail-delete-btn").addEventListener("click", async () => {
            if (!confirm("この日程調整を削除しますか？")) return;
            const { error } = await dbClient.from("schedule_events").delete().eq("id", currentEventId);
            if (error) { alert("削除失敗: " + error.message); return; }
            document.getElementById("event-detail-section").classList.add("hidden");
            document.getElementById("event-list-section").classList.remove("hidden");
            currentEventId = null;
            loadEvents();
        });

        // ---- 編集モーダル ----
        let editCurrentEvent = null;
        let editRemovedSlotIds = [];

        function makeSlotRow(containerId, slotId, date, startH, startM, endH, endM) {
            const hoursOpts = Array.from({length:24},(_,h)=>`<option value="${String(h).padStart(2,'0')}">${String(h).padStart(2,'0')}</option>`).join("");
            const div = document.createElement("div");
            div.className = "flex items-center gap-2 flex-wrap edit-slot-row";
            if (slotId) div.dataset.slotId = slotId;
            div.innerHTML = `
                <input type="date" class="slot-date border border-gray-300 rounded-lg px-2 py-1.5 text-sm" value="${date || ""}">
                <select class="slot-start-h border border-gray-300 rounded-lg px-2 py-1.5 text-sm"><option value="">--</option>${hoursOpts}</select>
                <select class="slot-start-m border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
                    <option value="">--</option><option value="00">00</option><option value="15">15</option>
                    <option value="30">30</option><option value="45">45</option>
                </select>
                <span class="text-sm text-gray-500">〜</span>
                <select class="slot-end-h border border-gray-300 rounded-lg px-2 py-1.5 text-sm"><option value="">--</option>${hoursOpts}</select>
                <select class="slot-end-m border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
                    <option value="">--</option><option value="00">00</option><option value="15">15</option>
                    <option value="30">30</option><option value="45">45</option>
                </select>
                <button type="button" class="remove-edit-slot-btn text-red-400 hover:text-red-600 text-sm px-1"><i class="fas fa-times"></i></button>`;
            div.querySelector(".slot-start-h").value = startH || "";
            div.querySelector(".slot-start-m").value = startM || "";
            div.querySelector(".slot-end-h").value = endH || "";
            div.querySelector(".slot-end-m").value = endM || "";
            div.querySelector(".remove-edit-slot-btn").addEventListener("click", () => {
                if (slotId) editRemovedSlotIds.push(slotId);
                div.remove();
            });
            document.getElementById(containerId).appendChild(div);
        }

        async function openEditModal() {
            editRemovedSlotIds = [];
            const ev = editCurrentEvent;
            document.getElementById("edit-title").value = ev.title || "";
            document.getElementById("edit-description").value = ev.description || "";
            document.getElementById("edit-deadline").value = ev.deadline || "";
            document.getElementById("edit-message").classList.add("hidden");

            // visibility
            const vis = ev.visibility || "all";
            document.querySelector(`input[name="edit-visibility"][value="${vis}"]`).checked = true;
            document.getElementById("edit-members-section").classList.toggle("hidden", vis !== "specific");

            // 既存スロットを描画
            const container = document.getElementById("edit-slot-inputs");
            container.innerHTML = "";
            currentSlots.forEach(s => {
                const sh = s.slot_start ? String(s.slot_start).slice(0,2) : "";
                const sm = s.slot_start ? String(s.slot_start).slice(3,5) : "";
                const eh = s.slot_end ? String(s.slot_end).slice(0,2) : "";
                const em = s.slot_end ? String(s.slot_end).slice(3,5) : "";
                makeSlotRow("edit-slot-inputs", s.id, s.slot_date, sh, sm, eh, em);
            });

            // 対象者チェックボックス描画
            renderEditMemberList(ev.id);

            document.getElementById("edit-modal").classList.remove("hidden");
        }

        async function renderEditMemberList(eventId) {
            const container = document.getElementById("edit-member-list");
            if (allMembers.length === 0) { container.innerHTML = '<p class="text-xs text-gray-400">メンバーが読み込まれていません。</p>'; return; }
            const { data: existing } = await dbClient.from("schedule_recipients").select("member_email").eq("event_id", eventId);
            const existingEmails = new Set((existing || []).map(r => r.member_email));
            container.innerHTML = allMembers.map(m => `
                <label class="flex items-center gap-2 py-1 hover:bg-gray-50 rounded cursor-pointer">
                    <input type="checkbox" value="${escapeHtml(m.email)}" class="edit-member-cb w-4 h-4" ${existingEmails.has(m.email) ? "checked" : ""}>
                    <span class="text-sm text-gray-700">${escapeHtml(m.full_name)} (${escapeHtml(m.email)})</span>
                </label>`).join("");
        }

        document.querySelectorAll('input[name="edit-visibility"]').forEach(radio => {
            radio.addEventListener("change", () => {
                document.getElementById("edit-members-section").classList.toggle("hidden", radio.value !== "specific");
                if (radio.value === "specific" && editCurrentEvent) renderEditMemberList(editCurrentEvent.id);
            });
        });

        document.getElementById("edit-add-slot-btn").addEventListener("click", () => {
            makeSlotRow("edit-slot-inputs", null, "", "", "", "", "");
        });

        function closeEditModal() { document.getElementById("edit-modal").classList.add("hidden"); }
        document.getElementById("edit-modal-close").addEventListener("click", closeEditModal);
        document.getElementById("edit-cancel-btn").addEventListener("click", closeEditModal);
        document.getElementById("edit-modal").addEventListener("click", e => {
            if (e.target === document.getElementById("edit-modal")) closeEditModal();
        });

        document.getElementById("detail-edit-btn").addEventListener("click", openEditModal);

        document.getElementById("edit-save-btn").addEventListener("click", async () => {
            const title = document.getElementById("edit-title").value.trim();
            const description = document.getElementById("edit-description").value.trim();
            const deadline = document.getElementById("edit-deadline").value || null;
            const visibility = document.querySelector('input[name="edit-visibility"]:checked').value;
            const msgEl = document.getElementById("edit-message");

            if (!title) { msgEl.textContent = "タイトルを入力してください。"; msgEl.classList.remove("hidden"); return; }

            // スロット収集
            const rows = document.querySelectorAll("#edit-slot-inputs .edit-slot-row");
            const newSlots = [];
            let sortOrder = 0;
            rows.forEach(row => {
                const date = row.querySelector(".slot-date").value;
                if (!date) return;
                const sh = row.querySelector(".slot-start-h").value;
                const sm = row.querySelector(".slot-start-m").value;
                const eh = row.querySelector(".slot-end-h").value;
                const em = row.querySelector(".slot-end-m").value;
                const existingId = row.dataset.slotId ? Number(row.dataset.slotId) : null;
                newSlots.push({ id: existingId, slot_date: date, slot_start: (sh && sm) ? `${sh}:${sm}:00` : null, slot_end: (eh && em) ? `${eh}:${em}:00` : null, sort_order: sortOrder++ });
            });

            if (newSlots.length === 0) { msgEl.textContent = "日程候補を1つ以上入力してください。"; msgEl.classList.remove("hidden"); return; }

            let selectedEmails = [];
            if (visibility === "specific") {
                document.querySelectorAll(".edit-member-cb:checked").forEach(cb => selectedEmails.push(cb.value));
                if (selectedEmails.length === 0) { msgEl.textContent = "対象メンバーを選択してください。"; msgEl.classList.remove("hidden"); return; }
            }

            // イベント更新
            const { error: evErr } = await dbClient.from("schedule_events")
                .update({ title, description: description || null, deadline, visibility, updated_at: new Date().toISOString() })
                .eq("id", currentEventId);
            if (evErr) { msgEl.textContent = "更新失敗: " + evErr.message; msgEl.classList.remove("hidden"); return; }

            // 削除されたスロットを削除
            if (editRemovedSlotIds.length > 0) {
                await dbClient.from("schedule_slots").delete().in("id", editRemovedSlotIds);
            }

            // 新規スロットを追加、既存スロットを更新
            const toInsert = newSlots.filter(s => !s.id).map(({id: _id, ...s}) => ({ ...s, event_id: currentEventId }));
            const toUpdate = newSlots.filter(s => s.id);
            if (toInsert.length > 0) await dbClient.from("schedule_slots").insert(toInsert);
            for (const s of toUpdate) {
                await dbClient.from("schedule_slots").update({ slot_date: s.slot_date, slot_start: s.slot_start, slot_end: s.slot_end, sort_order: s.sort_order }).eq("id", s.id);
            }

            // 対象者を更新（一旦全削除して再挿入）
            await dbClient.from("schedule_recipients").delete().eq("event_id", currentEventId);
            if (visibility === "specific" && selectedEmails.length > 0) {
                await dbClient.from("schedule_recipients").insert(selectedEmails.map(email => ({ event_id: currentEventId, member_email: email })));
            }

            closeEditModal();
            await openEventDetail(currentEventId);
        });

        // ---- 新規作成モーダル ----
        let slotCount = 0;

        function addSlotInput() {
            slotCount++;
            const div = document.createElement("div");
            div.className = "flex items-center gap-2 flex-wrap slot-row";
            div.innerHTML = `
                <input type="date" class="slot-date border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
                <select class="slot-start-h border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
                    <option value="">--</option>
                    ${Array.from({length:24},(_,h)=>`<option value="${String(h).padStart(2,'0')}">${String(h).padStart(2,'0')}</option>`).join("")}
                </select>
                <select class="slot-start-m border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
                    <option value="">--</option>
                    <option value="00">00</option><option value="15">15</option>
                    <option value="30">30</option><option value="45">45</option>
                </select>
                <span class="text-sm text-gray-500">〜</span>
                <select class="slot-end-h border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
                    <option value="">--</option>
                    ${Array.from({length:24},(_,h)=>`<option value="${String(h).padStart(2,'0')}">${String(h).padStart(2,'0')}</option>`).join("")}
                </select>
                <select class="slot-end-m border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
                    <option value="">--</option>
                    <option value="00">00</option><option value="15">15</option>
                    <option value="30">30</option><option value="45">45</option>
                </select>
                <button type="button" class="remove-slot-btn text-red-400 hover:text-red-600 text-sm px-1"><i class="fas fa-times"></i></button>`;
            div.querySelector(".remove-slot-btn").addEventListener("click", () => div.remove());
            document.getElementById("slot-inputs").appendChild(div);
        }

        document.getElementById("add-slot-btn").addEventListener("click", addSlotInput);

        // 対象者ラジオ
        document.querySelectorAll('input[name="create-visibility"]').forEach(radio => {
            radio.addEventListener("change", () => {
                const specific = radio.value === "specific";
                document.getElementById("create-members-section").classList.toggle("hidden", !specific);
                if (specific) renderCreateMemberList();
            });
        });

        function renderCreateMemberList() {
            const container = document.getElementById("create-member-list");
            if (allMembers.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-400">メンバーが読み込まれていません。</p>';
                return;
            }
            container.innerHTML = allMembers.map(m => `
                <label class="flex items-center gap-2 py-1 hover:bg-gray-50 rounded cursor-pointer">
                    <input type="checkbox" value="${escapeHtml(m.email)}" class="create-member-cb w-4 h-4">
                    <span class="text-sm text-gray-700">${escapeHtml(m.full_name)} (${escapeHtml(m.email)})</span>
                </label>`).join("");
        }

        function openCreateModal() {
            document.getElementById("create-title").value = "";
            document.getElementById("create-description").value = "";
            document.getElementById("create-deadline").value = "";
            document.getElementById("slot-inputs").innerHTML = "";
            document.getElementById("create-message").classList.add("hidden");
            document.getElementById("create-members-section").classList.add("hidden");
            document.querySelector('input[name="create-visibility"][value="all"]').checked = true;
            slotCount = 0;
            addSlotInput(); addSlotInput(); addSlotInput();
            document.getElementById("create-modal").classList.remove("hidden");
        }

        function closeCreateModal() { document.getElementById("create-modal").classList.add("hidden"); }

        document.getElementById("new-event-btn").addEventListener("click", openCreateModal);
        document.getElementById("create-modal-close").addEventListener("click", closeCreateModal);
        document.getElementById("create-cancel-btn").addEventListener("click", closeCreateModal);
        document.getElementById("create-modal").addEventListener("click", e => {
            if (e.target === document.getElementById("create-modal")) closeCreateModal();
        });

        document.getElementById("create-save-btn").addEventListener("click", async () => {
            const title = document.getElementById("create-title").value.trim();
            const description = document.getElementById("create-description").value.trim();
            const deadline = document.getElementById("create-deadline").value || null;
            const visibility = document.querySelector('input[name="create-visibility"]:checked').value;
            const msgEl = document.getElementById("create-message");

            if (!title) { msgEl.textContent = "タイトルを入力してください。"; msgEl.classList.remove("hidden"); return; }

            const slotRows = document.querySelectorAll("#slot-inputs .slot-row");
            const slots = [];
            let sortOrder = 0;
            for (const row of slotRows) {
                const date = row.querySelector(".slot-date").value;
                if (!date) continue;
                const sh = row.querySelector(".slot-start-h").value;
                const sm = row.querySelector(".slot-start-m").value;
                const eh = row.querySelector(".slot-end-h").value;
                const em = row.querySelector(".slot-end-m").value;
                slots.push({
                    slot_date: date,
                    slot_start: (sh && sm) ? `${sh}:${sm}:00` : null,
                    slot_end: (eh && em) ? `${eh}:${em}:00` : null,
                    sort_order: sortOrder++
                });
            }

            if (slots.length === 0) { msgEl.textContent = "日程候補を1つ以上入力してください。"; msgEl.classList.remove("hidden"); return; }

            let selectedEmails = [];
            if (visibility === "specific") {
                document.querySelectorAll(".create-member-cb:checked").forEach(cb => selectedEmails.push(cb.value));
                if (selectedEmails.length === 0) { msgEl.textContent = "対象メンバーを選択してください。"; msgEl.classList.remove("hidden"); return; }
            }

            const { data: evData, error: evErr } = await dbClient.from("schedule_events")
                .insert({ title, description: description || null, deadline, visibility, created_by_email: currentUser.email, created_by_name: currentUser.name || currentUser.email, is_closed: false })
                .select("id").single();

            if (evErr || !evData) { msgEl.textContent = "作成失敗: " + (evErr && evErr.message); msgEl.classList.remove("hidden"); return; }

            const { error: slotsErr } = await dbClient.from("schedule_slots")
                .insert(slots.map(s => ({ ...s, event_id: evData.id })));
            if (slotsErr) { msgEl.textContent = "日程候補の保存失敗: " + slotsErr.message; msgEl.classList.remove("hidden"); return; }

            if (visibility === "specific" && selectedEmails.length > 0) {
                await dbClient.from("schedule_recipients")
                    .insert(selectedEmails.map(email => ({ event_id: evData.id, member_email: email })));
            }

            closeCreateModal();
            await openEventDetail(evData.id);
        });

        // ---- 初期化 ----
        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            authTargetId: "authArea",
            returnTo: "schedule.html",
            onReady: async ({ client, session, profile }) => {
                dbClient = client;
                const sessionUser = session && session.user ? session.user : null;
                currentUser = {
                    email: (sessionUser && sessionUser.email) || (session && session.email) || (profile && profile.email) || "",
                    name: (session && session.displayName) || (profile && profile.display_name) || ""
                };
                await Promise.all([loadMembers(), loadEvents()]);

                // URLパラメータでイベントIDが指定されている場合は直接開く
                const params = new URLSearchParams(window.location.search);
                const eventIdParam = params.get("id");
                if (eventIdParam) {
                    await openEventDetail(Number(eventIdParam));
                }
            }
        });
    </script>
</body>
</html>
