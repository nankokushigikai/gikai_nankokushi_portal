<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議案PDFビューア | 南国市議会DXポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #pdf-text-layer {
            line-height: 1;
            user-select: text;
        }

        #pdf-text-layer span,
        #pdf-text-layer br {
            color: transparent;
            position: absolute;
            transform-origin: 0 0;
            white-space: pre;
            cursor: text;
        }

        #pdf-text-layer .highlight {
            background: rgba(255, 217, 102, 0.6);
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="bg-indigo-700 text-white shadow-lg p-4">
        <div class="container mx-auto flex items-center justify-between gap-3">
            <h1 id="viewer-title" class="text-base md:text-lg font-bold">議案PDF</h1>
            <button id="finish-btn" type="button" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">
                <i class="fas fa-times mr-1"></i>終了
            </button>
        </div>
    </header>

    <main class="container mx-auto py-4 px-4">
        <div class="bg-white rounded-xl shadow-sm p-3 md:p-4">
            <p id="viewer-subtitle" class="text-sm text-gray-600 mb-3"></p>
            <div class="mb-3 flex items-center justify-between gap-3 flex-wrap text-sm">
                <span id="pdf-page-indicator-top" class="text-gray-600 font-semibold">ページ 0 / 0</span>
                <div id="ink-toolbar-top" class="flex-1 flex items-center justify-center gap-2 flex-wrap text-xs min-w-[320px]">
                    <button id="tag-list-btn-top" type="button" class="ml-1 px-3 py-2 rounded-lg border border-indigo-300 bg-white hover:bg-indigo-50 text-indigo-700 font-semibold whitespace-nowrap">
                        <i class="fas fa-list mr-1"></i>タグ一覧
                    </button>
                    <button id="tag-pick-mode-btn-top" type="button" class="ml-1 mr-3 px-3 py-2 rounded-lg border border-sky-300 bg-white hover:bg-sky-50 text-sky-700 font-semibold whitespace-nowrap">
                        <i class="fas fa-tag mr-1"></i>タグ
                    </button>
                    <div class="flex items-center gap-1">
                        <button id="ink-tool-pen-btn-top" type="button" class="px-2.5 py-1.5 rounded border border-emerald-300 bg-emerald-50 text-emerald-800 font-semibold">ペン</button>
                        <button id="ink-tool-marker-btn-top" type="button" class="px-2.5 py-1.5 rounded border border-gray-300 bg-white text-gray-700 font-semibold">マーカー</button>
                    </div>
                    <label class="flex items-center gap-1 text-gray-600">
                        色
                        <input id="ink-color-top" type="color" value="#ff2d55" class="w-8 h-8 p-0 border border-gray-300 rounded">
                    </label>
                    <label class="flex items-center gap-1 text-gray-600">
                        太さ
                        <input id="ink-size-top" type="range" min="1" max="24" value="3" class="w-24">
                    </label>
                    <button id="ink-undo-btn-top" type="button" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700">元に戻す</button>
                    <button id="ink-clear-btn-top" type="button" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700">全消去</button>
                    <span id="ink-status-top" class="text-gray-500"></span>
                </div>
                <div class="ml-auto flex items-center gap-2">
                    <button id="pdf-prev-page-btn-top" type="button" class="w-36 md:w-44 px-6 py-3 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold text-center">前ページ</button>
                    <button id="pdf-next-page-btn-top" type="button" class="w-36 md:w-44 px-6 py-3 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold text-center">次ページ</button>
                </div>
            </div>
            <div id="pdf-stage" class="relative">
                <canvas id="pdf-render-canvas" class="relative z-0 w-full border border-gray-200 rounded-lg bg-gray-50"></canvas>
                <div id="pdf-text-layer" class="absolute inset-0 z-[5] rounded-lg"></div>
                <canvas id="pdf-ink-canvas" class="absolute inset-0 z-10 rounded-lg" style="touch-action: none;"></canvas>
                <div id="tag-pin-layer" class="absolute inset-0 z-20 pointer-events-none"></div>
                <div id="tag-pin-popover" class="absolute z-30 hidden w-72 bg-white border border-sky-200 rounded-lg shadow-xl p-3">
                    <p id="tag-pin-popover-text" class="text-sm text-gray-700 whitespace-pre-wrap break-words"></p>
                    <div class="mt-2 flex items-center justify-end gap-2">
                        <button id="tag-pin-edit-btn" type="button" class="px-2.5 py-1.5 rounded border border-amber-300 bg-amber-50 hover:bg-amber-100 text-amber-700 text-xs">修正</button>
                        <button id="tag-pin-delete-btn" type="button" class="px-2.5 py-1.5 rounded border border-rose-300 bg-rose-50 hover:bg-rose-100 text-rose-700 text-xs">削除</button>
                        <button id="tag-pin-close-btn" type="button" class="px-2.5 py-1.5 rounded border border-gray-300 bg-white hover:bg-gray-50 text-gray-600 text-xs">閉じる</button>
                    </div>
                </div>
                <div id="tag-float-box" class="absolute z-30 hidden w-72 bg-white border border-sky-200 rounded-lg shadow-xl p-3">
                    <p class="text-xs text-sky-700 font-semibold mb-2">タグ内容を入力</p>
                    <input id="tag-float-input" type="text" class="w-full border border-sky-200 rounded px-2.5 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300" placeholder="例: 要確認、質問候補">
                    <div class="mt-2 flex items-center justify-end gap-2">
                        <button id="tag-float-cancel-btn" type="button" class="px-3 py-1.5 rounded border border-gray-300 bg-white hover:bg-gray-50 text-xs text-gray-700">取消</button>
                        <button id="tag-float-save-btn" type="button" class="px-3 py-1.5 rounded bg-sky-600 hover:bg-sky-700 text-white text-xs font-semibold">保存</button>
                    </div>
                </div>
            </div>
            <div class="mt-3 flex items-center justify-between gap-3 flex-wrap text-sm">
                <span id="pdf-page-indicator" class="text-gray-600 font-semibold">ページ 0 / 0</span>
                <div id="ink-toolbar" class="flex-1 flex items-center justify-center gap-2 flex-wrap text-xs min-w-[320px]">
                    <button id="tag-list-btn" type="button" class="ml-1 px-3 py-2 rounded-lg border border-indigo-300 bg-white hover:bg-indigo-50 text-indigo-700 font-semibold whitespace-nowrap">
                        <i class="fas fa-list mr-1"></i>タグ一覧
                    </button>
                    <button id="tag-pick-mode-btn" type="button" class="ml-1 mr-3 px-3 py-2 rounded-lg border border-sky-300 bg-white hover:bg-sky-50 text-sky-700 font-semibold whitespace-nowrap">
                        <i class="fas fa-tag mr-1"></i>タグ
                    </button>
                    <div class="flex items-center gap-1">
                        <button id="ink-tool-pen-btn" type="button" class="px-2.5 py-1.5 rounded border border-emerald-300 bg-emerald-50 text-emerald-800 font-semibold">ペン</button>
                        <button id="ink-tool-marker-btn" type="button" class="px-2.5 py-1.5 rounded border border-gray-300 bg-white text-gray-700 font-semibold">マーカー</button>
                    </div>
                    <label class="flex items-center gap-1 text-gray-600">
                        色
                        <input id="ink-color" type="color" value="#ff2d55" class="w-8 h-8 p-0 border border-gray-300 rounded">
                    </label>
                    <label class="flex items-center gap-1 text-gray-600">
                        太さ
                        <input id="ink-size" type="range" min="1" max="24" value="3" class="w-24">
                    </label>
                    <button id="ink-undo-btn" type="button" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700">元に戻す</button>
                    <button id="ink-clear-btn" type="button" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700">全消去</button>
                    <span id="ink-status" class="text-gray-500"></span>
                </div>
                <div class="ml-auto flex items-center gap-2">
                    <button id="pdf-prev-page-btn" type="button" class="w-36 md:w-44 px-6 py-3 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold text-center">前ページ</button>
                    <button id="pdf-next-page-btn" type="button" class="w-36 md:w-44 px-6 py-3 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold text-center">次ページ</button>
                </div>
            </div>
            <p id="viewer-path" class="mt-3 text-xs text-gray-500 break-all"></p>

            <section id="memo-panel" class="mt-4 border border-yellow-200 bg-yellow-50/40 rounded-xl p-4">
                <div class="flex items-center justify-between gap-2 flex-wrap mb-2">
                    <h2 class="text-sm md:text-base font-bold text-amber-700">
                        <i class="fas fa-keyboard mr-1"></i>手入力メモ
                    </h2>
                    <span id="memo-status" class="text-xs text-gray-500"></span>
                </div>
                <textarea id="memo-textarea"
                    class="w-full border border-yellow-200 rounded-lg p-3 text-sm h-32 resize-y focus:outline-none focus:ring-2 focus:ring-yellow-300"
                    placeholder="この資料に対するメモを入力して保存できます。"></textarea>
                <div class="mt-3 flex items-center justify-between gap-2 flex-wrap">
                    <a href="document-notes.html" class="text-xs text-indigo-600 hover:text-indigo-800 font-semibold">
                        <i class="fas fa-search mr-1"></i>メモ一覧で確認
                    </a>
                    <div class="flex gap-2">
                        <button id="memo-clear-btn" type="button" class="px-3 py-2 rounded-lg text-xs border border-gray-300 bg-white hover:bg-gray-50 text-gray-700">クリア</button>
                        <button id="memo-save-btn" type="button" class="px-3 py-2 rounded-lg text-xs bg-yellow-500 hover:bg-yellow-600 text-white font-semibold">
                            <i class="fas fa-save mr-1"></i>メモ保存
                        </button>
                    </div>
                </div>
            </section>

            <section id="tag-panel" class="mt-4 border border-sky-200 bg-sky-50/40 rounded-xl p-4">
                <div class="flex items-center justify-between gap-2 flex-wrap mb-2">
                    <h2 class="text-sm md:text-base font-bold text-sky-700">
                        <i class="fas fa-tag mr-1"></i>PDFタグ
                    </h2>
                    <span id="tag-status" class="text-xs text-gray-500"></span>
                </div>
                <p class="text-xs text-gray-600 mb-2">現在ページ: <span id="tag-current-page" class="font-semibold">1</span></p>
                <p class="text-xs text-sky-700 mb-3">タグボタンを押してから、PDF上の該当箇所をタップ/クリックすると入力ボックスが表示されます。</p>
                <div class="mt-4 overflow-x-auto">
                    <table class="min-w-full text-sm border border-sky-100 rounded-lg overflow-hidden">
                        <thead class="bg-sky-100/70 text-sky-900">
                            <tr>
                                <th class="text-left px-3 py-2 font-semibold">資料名</th>
                                <th class="text-left px-3 py-2 font-semibold">ページ</th>
                                <th class="text-left px-3 py-2 font-semibold">タグ内容</th>
                                <th class="text-left px-3 py-2 font-semibold">更新</th>
                                <th class="text-left px-3 py-2 font-semibold">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tag-list-body" class="divide-y divide-sky-100 bg-white"></tbody>
                    </table>
                </div>
            </section>

            <section id="selection-lookup-panel" class="mt-4 border border-violet-200 bg-violet-50/40 rounded-xl p-4">
                <div class="flex items-center justify-between gap-2 flex-wrap mb-2">
                    <h2 class="text-sm md:text-base font-bold text-violet-700">
                        <i class="fas fa-magnifying-glass mr-1"></i>文字選択検索
                    </h2>
                    <span id="selection-lookup-status" class="text-xs text-gray-500"></span>
                </div>
                <p class="text-xs text-violet-700 mb-2">PDFで短い文字を選択すると、関連情報を検索します。</p>
                <div class="mb-3 text-sm">
                    <span class="text-gray-500">選択文字:</span>
                    <span id="selection-query-text" class="font-semibold text-violet-800 ml-1">(未選択)</span>
                </div>
                <div id="selection-lookup-results" class="space-y-2"></div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <script>
        let activePdfObjectUrl = null;
        let _noteClient = null;
        let _noteMemberId = null;
        let inkModeEnabled = false;
        let inkColor = "#ff2d55";
        let inkSize = 3;
        let inkTool = "pen";
        let pdfDoc = null;
        let currentPageNumber = 1;
        let inkPages = {};
        let inkStrokes = [];
        let currentInkStroke = null;
        let currentSessionId = "";
        let currentFileName = "";
        let tagPlacementMode = false;
        let tagRows = [];
        let pendingTagPosition = null;
        let activeTagPopoverId = null;
        let latestSelectedText = "";
        let selectionSearchTimer = null;

        const pdfjsLib = window.pdfjsLib;
        if (pdfjsLib && pdfjsLib.GlobalWorkerOptions) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }

        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || "";
        }

        function releasePdfObjectUrl() {
            if (!activePdfObjectUrl) {
                return;
            }
            URL.revokeObjectURL(activePdfObjectUrl);
            activePdfObjectUrl = null;
        }

        function getInkCanvas() {
            return document.getElementById("pdf-ink-canvas");
        }

        function getPdfCanvas() {
            return document.getElementById("pdf-render-canvas");
        }

        function getPdfTextLayer() {
            return document.getElementById("pdf-text-layer");
        }

        function getInkContext() {
            const canvas = getInkCanvas();
            return canvas.getContext("2d");
        }

        function getPdfPageKey() {
            return String(currentPageNumber || 1);
        }

        function syncCurrentPageInkToStore() {
            inkPages[getPdfPageKey()] = Array.isArray(inkStrokes) ? inkStrokes : [];
        }

        function loadCurrentPageInkFromStore() {
            const value = inkPages[getPdfPageKey()];
            inkStrokes = Array.isArray(value) ? value : [];
        }

        function updatePdfPageIndicator() {
            const indicator = document.getElementById("pdf-page-indicator");
            const indicatorTop = document.getElementById("pdf-page-indicator-top");
            const tagCurrentPage = document.getElementById("tag-current-page");
            const prevBtn = document.getElementById("pdf-prev-page-btn");
            const nextBtn = document.getElementById("pdf-next-page-btn");
            const prevBtnTop = document.getElementById("pdf-prev-page-btn-top");
            const nextBtnTop = document.getElementById("pdf-next-page-btn-top");
            const total = pdfDoc ? pdfDoc.numPages : 0;
            const text = `ページ ${currentPageNumber} / ${total}`;
            indicator.textContent = text;
            indicatorTop.textContent = text;
            if (tagCurrentPage) {
                tagCurrentPage.textContent = String(currentPageNumber);
            }
            const prevDisabled = !pdfDoc || currentPageNumber <= 1;
            const nextDisabled = !pdfDoc || currentPageNumber >= total;
            prevBtn.disabled = prevDisabled;
            nextBtn.disabled = nextDisabled;
            prevBtnTop.disabled = prevDisabled;
            nextBtnTop.disabled = nextDisabled;
        }

        function setInkStatus(message) {
            document.getElementById("ink-status").textContent = message;
            const statusTop = document.getElementById("ink-status-top");
            if (statusTop) {
                statusTop.textContent = message;
            }
        }

        function updateInkToolButtons() {
            const isPenActive = inkModeEnabled && inkTool === "pen";
            const isMarkerActive = inkModeEnabled && inkTool === "marker";
            const penClassesOn = "px-2.5 py-1.5 rounded border border-emerald-300 bg-emerald-50 text-emerald-800 font-semibold";
            const penClassesOff = "px-2.5 py-1.5 rounded border border-gray-200 bg-gray-50 text-gray-500 font-semibold hover:bg-white";
            const markerClassesOn = "px-2.5 py-1.5 rounded border border-amber-300 bg-amber-50 text-amber-800 font-semibold";
            const markerClassesOff = "px-2.5 py-1.5 rounded border border-gray-200 bg-gray-50 text-gray-500 font-semibold hover:bg-white";

            document.getElementById("ink-tool-pen-btn").className = isPenActive ? penClassesOn : penClassesOff;
            document.getElementById("ink-tool-marker-btn").className = isMarkerActive ? markerClassesOn : markerClassesOff;
            document.getElementById("ink-tool-pen-btn-top").className = isPenActive ? penClassesOn : penClassesOff;
            document.getElementById("ink-tool-marker-btn-top").className = isMarkerActive ? markerClassesOn : markerClassesOff;
        }

        function syncInkSettingInputs() {
            const colorBottom = document.getElementById("ink-color");
            const colorTop = document.getElementById("ink-color-top");
            const sizeBottom = document.getElementById("ink-size");
            const sizeTop = document.getElementById("ink-size-top");

            colorBottom.value = inkColor;
            colorTop.value = inkColor;
            sizeBottom.value = String(inkSize);
            sizeTop.value = String(inkSize);
        }

        function getNoteClient() {
            if (_noteClient) {
                return _noteClient;
            }
            _noteClient = window.portalAuth && typeof window.portalAuth.ensureClient === "function"
                ? window.portalAuth.ensureClient()
                : window.supabase.createClient(window.AUTH_CONFIG.supabaseUrl, window.AUTH_CONFIG.supabaseAnonKey);
            return _noteClient;
        }

        function getNoteMemberId() {
            if (_noteMemberId) {
                return _noteMemberId;
            }
            const sess = window.portalAuth && typeof window.portalAuth.getSession === "function"
                ? window.portalAuth.getSession()
                : null;
            _noteMemberId = sess && sess.memberId ? sess.memberId : null;
            return _noteMemberId;
        }

        function setMemoStatus(message) {
            document.getElementById("memo-status").textContent = message;
        }

        function setTagStatus(message) {
            document.getElementById("tag-status").textContent = message;
        }

        function setSelectionLookupStatus(message) {
            document.getElementById("selection-lookup-status").textContent = message;
        }

        function setSelectionQueryText(text) {
            document.getElementById("selection-query-text").textContent = text || "(未選択)";
        }

        function escapeLikePattern(value) {
            return String(value || "").replace(/[\\%_]/g, (ch) => `\\${ch}`);
        }

        function normalizeSelectedText(text) {
            return String(text || "").replace(/\s+/g, " ").trim();
        }

        function renderSelectionLookupResults(items) {
            const container = document.getElementById("selection-lookup-results");
            container.innerHTML = "";

            if (!Array.isArray(items) || items.length === 0) {
                const empty = document.createElement("p");
                empty.className = "text-sm text-gray-500";
                empty.textContent = "一致する情報は見つかりませんでした。";
                container.appendChild(empty);
                return;
            }

            items.forEach((item) => {
                const card = document.createElement("article");
                card.className = "border border-violet-200 bg-white rounded-lg p-3";

                const title = document.createElement("h3");
                title.className = "text-sm font-bold text-violet-800";
                title.textContent = item.title || item.keyword || "関連情報";
                card.appendChild(title);

                if (item.body) {
                    const body = document.createElement("p");
                    body.className = "mt-1 text-sm text-gray-700 whitespace-pre-wrap";
                    body.textContent = item.body;
                    card.appendChild(body);
                }

                if (item.image_url) {
                    const img = document.createElement("img");
                    img.className = "mt-2 max-h-40 rounded border border-gray-200";
                    img.src = item.image_url;
                    img.alt = item.title || "関連画像";
                    card.appendChild(img);
                }

                if (item.source_url) {
                    const link = document.createElement("a");
                    link.className = "mt-2 inline-block text-xs text-indigo-700 hover:text-indigo-900 hover:underline";
                    link.href = item.source_url;
                    link.target = "_blank";
                    link.rel = "noopener noreferrer";
                    link.textContent = "参照元を開く";
                    card.appendChild(link);
                }

                container.appendChild(card);
            });
        }

        async function searchSelectionLookup(queryText) {
            const q = normalizeSelectedText(queryText);
            if (!q || q.length < 2) {
                setSelectionLookupStatus("2文字以上を選択してください");
                renderSelectionLookupResults([]);
                return;
            }

            setSelectionLookupStatus("検索中...");

            try {
                const supabase = getNoteClient();
                const pattern = `%${escapeLikePattern(q)}%`;
                const { data, error } = await supabase
                    .from("document_text_lookup")
                    .select("id, keyword, title, body, image_url, source_url, updated_at")
                    .or(`keyword.ilike.${pattern},title.ilike.${pattern},body.ilike.${pattern}`)
                    .order("updated_at", { ascending: false })
                    .limit(20);

                if (error) {
                    throw error;
                }

                renderSelectionLookupResults(data || []);
                setSelectionLookupStatus(`${(data || []).length}件`);
            } catch (error) {
                console.warn("選択文字検索エラー:", error);
                renderSelectionLookupResults([]);
                setSelectionLookupStatus(`検索エラー: ${formatSupabaseError(error)}`);
            }
        }

        function getCurrentSelectedTextInPdf() {
            const stage = document.getElementById("pdf-stage");
            const selection = window.getSelection ? window.getSelection() : null;
            if (!stage || !selection || selection.isCollapsed) {
                return "";
            }

            const anchorNode = selection.anchorNode;
            const focusNode = selection.focusNode;
            if (!anchorNode || !focusNode) {
                return "";
            }

            if (!stage.contains(anchorNode) || !stage.contains(focusNode)) {
                return "";
            }

            return normalizeSelectedText(selection.toString());
        }

        function scheduleSelectionLookup() {
            if (selectionSearchTimer) {
                clearTimeout(selectionSearchTimer);
            }
            selectionSearchTimer = setTimeout(async () => {
                const selected = getCurrentSelectedTextInPdf();
                if (!selected || selected === latestSelectedText) {
                    return;
                }
                latestSelectedText = selected;
                setSelectionQueryText(selected);
                await searchSelectionLookup(selected);
            }, 160);
        }

        function formatSupabaseError(error) {
            if (!error) {
                return "不明なエラー";
            }
            if (typeof error === "string") {
                return error;
            }
            return error.message || error.details || error.hint || "不明なエラー";
        }

        function getTagPinLayer() {
            return document.getElementById("tag-pin-layer");
        }

        function getTagFloatBox() {
            return document.getElementById("tag-float-box");
        }

        function getTagPinPopover() {
            return document.getElementById("tag-pin-popover");
        }

        function findTagById(tagId) {
            if (!Array.isArray(tagRows)) {
                return null;
            }
            return tagRows.find((tag) => Number(tag.id) === Number(tagId)) || null;
        }

        function closeTagPinPopover() {
            const popover = getTagPinPopover();
            if (!popover) {
                return;
            }
            popover.classList.add("hidden");
            activeTagPopoverId = null;
        }

        function redrawInkCanvas() {
            const canvas = getInkCanvas();
            const ctx = getInkContext();
            const ratio = window.devicePixelRatio || 1;
            const width = canvas.width / ratio;
            const height = canvas.height / ratio;

            if (width <= 0 || height <= 0) {
                return;
            }

            ctx.clearRect(0, 0, width, height);

            for (const stroke of inkStrokes) {
                if (!stroke.points || stroke.points.length === 0) {
                    continue;
                }

                ctx.strokeStyle = stroke.color || "#ff2d55";
                ctx.lineWidth = Number(stroke.size || 3);
                ctx.globalAlpha = stroke.tool === "marker" ? 0.35 : 1;
                if (stroke.tool === "marker") {
                    ctx.lineCap = "butt";
                    ctx.lineJoin = "miter";
                } else {
                    ctx.lineCap = "round";
                    ctx.lineJoin = "round";
                }

                ctx.beginPath();
                stroke.points.forEach((point, idx) => {
                    const x = point.x * width;
                    const y = point.y * height;
                    if (idx === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
            }

            ctx.globalAlpha = 1;
        }

        function resizeInkCanvas() {
            const pdfCanvas = getPdfCanvas();
            const canvas = getInkCanvas();
            const textLayer = getPdfTextLayer();
            const ratio = window.devicePixelRatio || 1;
            const width = Math.floor(pdfCanvas.clientWidth || 0);
            const height = Math.floor(pdfCanvas.clientHeight || 0);

            canvas.width = Math.max(1, Math.floor(width * ratio));
            canvas.height = Math.max(1, Math.floor(height * ratio));
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            if (textLayer) {
                textLayer.style.width = `${width}px`;
                textLayer.style.height = `${height}px`;
            }

            const ctx = getInkContext();
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            redrawInkCanvas();
            syncTagPinLayerSize();
            renderTagPinsForCurrentPage();
        }

        function updateInkCanvasVisibility() {
            const canvas = getInkCanvas();
            const textLayer = getPdfTextLayer();
            const canDraw = inkModeEnabled;
            const hasInk = inkStrokes.length > 0;

            // 手書きデータは常時表示し、描画入力だけモードON時に有効化する
            canvas.classList.toggle("hidden", !(hasInk || canDraw));
            canvas.style.pointerEvents = canDraw ? "auto" : "none";
            if (textLayer) {
                textLayer.style.pointerEvents = canDraw ? "none" : "auto";
                textLayer.style.userSelect = canDraw ? "none" : "text";
            }

            updateInkToolButtons();
            syncInkSettingInputs();
        }

        function resetInkData() {
            inkPages = {};
            inkStrokes = [];
            currentInkStroke = null;
            inkModeEnabled = false;
            updateInkCanvasVisibility();
            redrawInkCanvas();
        }

        function appendInkPointFromPointer(event) {
            if (!currentInkStroke) {
                return;
            }

            const canvas = getInkCanvas();
            const rect = canvas.getBoundingClientRect();
            let x = (event.clientX - rect.left) / Math.max(1, rect.width);
            let y = (event.clientY - rect.top) / Math.max(1, rect.height);

            x = Math.min(1, Math.max(0, x));
            y = Math.min(1, Math.max(0, y));

            if (currentInkStroke.tool === "marker") {
                if (currentInkStroke.points.length === 0) {
                    currentInkStroke.markerStartX = x;
                    currentInkStroke.markerStartY = y;
                } else {
                    const startX = Number(currentInkStroke.markerStartX ?? currentInkStroke.points[0].x ?? x);
                    const startY = Number(currentInkStroke.markerStartY ?? currentInkStroke.points[0].y ?? y);
                    const dx = Math.abs(x - startX);
                    const dy = Math.abs(y - startY);

                    // 描き始めの手ブレを抑えるため、初期は水平ロックを優先。
                    // 明確に縦方向の意図がある場合だけ、早い段階で縦ロックへ切替える。
                    if (currentInkStroke.markerLockAxis === "horizontal"
                        && currentInkStroke.points.length <= 3
                        && dy > 0.02
                        && dy > dx * 2.5) {
                        currentInkStroke.markerLockAxis = "vertical";
                    }

                    if (currentInkStroke.markerLockAxis === "horizontal") {
                        y = startY;
                    } else if (currentInkStroke.markerLockAxis === "vertical") {
                        x = startX;
                    }
                }
            }

            const lastPoint = currentInkStroke.points[currentInkStroke.points.length - 1];
            if (lastPoint) {
                const minStep = currentInkStroke.tool === "marker" ? 0.004 : 0.0015;
                if (Math.abs(x - lastPoint.x) < minStep && Math.abs(y - lastPoint.y) < minStep) {
                    return;
                }
            }

            currentInkStroke.points.push({
                x,
                y
            });
        }

        function setupInkCanvasEvents() {
            const canvas = getInkCanvas();

            canvas.addEventListener("pointerdown", (event) => {
                if (!inkModeEnabled) {
                    return;
                }

                event.preventDefault();
                canvas.setPointerCapture(event.pointerId);

                currentInkStroke = {
                    color: inkColor,
                    size: Number(inkSize),
                    tool: inkTool,
                    markerStartX: null,
                    markerStartY: null,
                    markerLockAxis: inkTool === "marker" ? "horizontal" : "",
                    points: []
                };

                appendInkPointFromPointer(event);
                inkStrokes.push(currentInkStroke);
                redrawInkCanvas();
            });

            canvas.addEventListener("pointermove", (event) => {
                if (!currentInkStroke) {
                    return;
                }
                event.preventDefault();
                appendInkPointFromPointer(event);
                redrawInkCanvas();
            });

            const finishStroke = (event) => {
                if (!currentInkStroke) {
                    return;
                }
                event.preventDefault();
                appendInkPointFromPointer(event);
                currentInkStroke = null;
                updateInkCanvasVisibility();
                redrawInkCanvas();
                syncCurrentPageInkToStore();
                setInkStatus(`未保存（${currentPageNumber}ページ: ${inkStrokes.length}件）`);
            };

            canvas.addEventListener("pointerup", finishStroke);
            canvas.addEventListener("pointercancel", finishStroke);
            window.addEventListener("resize", () => {
                if (!pdfDoc) {
                    return;
                }
                renderPdfPage(currentPageNumber).catch((error) => {
                    console.warn("リサイズ時のPDF再描画に失敗:", error);
                });
            });
        }

        function parseInkPayload(payload) {
            if (!payload) {
                return {};
            }
            if (Array.isArray(payload)) {
                // 旧フォーマット互換: 1ページ目として扱う
                return { "1": payload };
            }
            if (payload.pages && typeof payload.pages === "object") {
                return payload.pages;
            }
            return {};
        }

        function buildInkPayloadForSave() {
            syncCurrentPageInkToStore();
            const pages = {};
            Object.keys(inkPages).forEach((key) => {
                const strokes = Array.isArray(inkPages[key]) ? inkPages[key] : [];
                const valid = strokes.filter((stroke) => Array.isArray(stroke.points) && stroke.points.length >= 2);
                if (valid.length > 0) {
                    pages[key] = valid;
                }
            });
            return {
                version: 2,
                pages
            };
        }

        async function renderPdfTextLayer(page, viewport) {
            const textLayer = getPdfTextLayer();
            if (!textLayer || !page) {
                return;
            }

            textLayer.innerHTML = "";
            textLayer.style.width = `${viewport.width}px`;
            textLayer.style.height = `${viewport.height}px`;

            const textContent = await page.getTextContent();
            if (pdfjsLib && typeof pdfjsLib.renderTextLayer === "function") {
                const task = pdfjsLib.renderTextLayer({
                    textContent,
                    container: textLayer,
                    viewport,
                    textDivs: []
                });
                if (task && task.promise) {
                    await task.promise;
                }
            }
        }

        async function renderPdfPage(pageNumber) {
            if (!pdfDoc) {
                return;
            }

            const page = await pdfDoc.getPage(pageNumber);
            const stage = document.getElementById("pdf-stage");
            const pdfCanvas = getPdfCanvas();
            const pdfCtx = pdfCanvas.getContext("2d");
            const ratio = window.devicePixelRatio || 1;
            const baseViewport = page.getViewport({ scale: 1.0 });
            const stageWidth = Math.max(320, stage.clientWidth || baseViewport.width);
            const scale = stageWidth / baseViewport.width;
            const viewport = page.getViewport({ scale });

            pdfCanvas.width = Math.max(1, Math.floor(viewport.width * ratio));
            pdfCanvas.height = Math.max(1, Math.floor(viewport.height * ratio));
            pdfCanvas.style.width = `${viewport.width}px`;
            pdfCanvas.style.height = `${viewport.height}px`;

            pdfCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
            pdfCtx.clearRect(0, 0, viewport.width, viewport.height);
            await page.render({ canvasContext: pdfCtx, viewport }).promise;
            await renderPdfTextLayer(page, viewport);

            resizeInkCanvas();
            updatePdfPageIndicator();
        }

        async function goToPdfPage(pageNumber) {
            if (!pdfDoc) {
                return;
            }

            const bounded = Math.max(1, Math.min(pdfDoc.numPages, pageNumber));
            if (bounded === currentPageNumber) {
                return;
            }

            syncCurrentPageInkToStore();
            currentPageNumber = bounded;
            await renderPdfPage(currentPageNumber);
            loadCurrentPageInkFromStore();
            updateInkCanvasVisibility();
            redrawInkCanvas();
            renderTagPinsForCurrentPage();
            setInkStatus(`表示中: ${currentPageNumber}ページ`);
        }

                loadCurrentPageInkFromStore();
                inkModeEnabled = false;
                updateInkCanvasVisibility();
                requestAnimationFrame(() => requestAnimationFrame(() => redrawInkCanvas()));

            const returnTo = `assembly-documents.html?session=${encodeURIComponent(tag.session_id || "")}`;
            const url = new URL("assembly-document-viewer.html", window.location.href);
            url.searchParams.set("session", tag.session_id || "");
            url.searchParams.set("fileName", tag.document_name || "");
            url.searchParams.set("label", tag.document_label || tag.document_name || "資料");
            url.searchParams.set("pdf", tag.pdf_url || "");
            url.searchParams.set("returnTo", returnTo);
            if (tag.page_number) {
                url.searchParams.set("openPage", String(tag.page_number));
            }
            if (Number.isFinite(Number(tag.pos_x)) && Number.isFinite(Number(tag.pos_y))) {
                url.searchParams.set("focusX", String(tag.pos_x));
                url.searchParams.set("focusY", String(tag.pos_y));
            }
            return url.toString();
        }

                const { data, error } = await supabase
                    .from("document_tags")
                    .select("id, session_id, document_name, document_label, pdf_url, page_number, tag_text, pos_x, pos_y, updated_at")
                    .eq("member_id", memberId)
                    .order("updated_at", { ascending: false })
                    .limit(300);

                if (error) {
                    throw error;
                }

                tagRows = data || [];
                renderTagList(tagRows);
                renderTagPinsForCurrentPage();
                setTagStatus(`${(data || []).length}件`);
            } catch (error) {
                console.warn("タグ一覧読込エラー:", error);
                tagRows = [];
                renderTagList([]);
                renderTagPinsForCurrentPage();
                setTagStatus(`タグ読込エラー: ${formatSupabaseError(error)}`);
            }
        }

        async function saveDocumentTag(tagText, position = null) {
            const memberId = getNoteMemberId();
            const saveBtn = document.getElementById("tag-float-save-btn");
            const text = (tagText || "").trim();

            if (!text) {
                setTagStatus("タグ内容を入力してください");
                return;
            }

            if (!memberId || !currentSessionId || !currentFileName) {
                setTagStatus("保存対象の情報が不足しています");
                return;
            }

            if (saveBtn) {
                saveBtn.disabled = true;
            }
            setTagStatus("タグ保存中...");

            try {
                const supabase = getNoteClient();
                const now = new Date().toISOString();
                let { error } = await supabase
                    .from("document_tags")
                    .insert({
                        member_id: memberId,
                        session_id: currentSessionId,
                        document_name: currentFileName,
                        document_label: getLabel(),
                        pdf_url: getPdfUrl(),
                        page_number: currentPageNumber,
                        tag_text: text,
                        pos_x: position && Number.isFinite(Number(position.x)) ? Number(position.x) : null,
                        pos_y: position && Number.isFinite(Number(position.y)) ? Number(position.y) : null,
                        updated_at: now
                    });

                // 旧スキーマ互換: pos_x/pos_y 列未追加の場合は座標なしで再試行
                if (error && /pos_x|pos_y|column/i.test(formatSupabaseError(error))) {
                    const retry = await supabase
                        .from("document_tags")
                        .insert({
                            member_id: memberId,
                            session_id: currentSessionId,
                            document_name: currentFileName,
                            document_label: getLabel(),
                            pdf_url: getPdfUrl(),
                            page_number: currentPageNumber,
                            tag_text: text,
                            updated_at: now
                        });
                    error = retry.error;
                    if (!error) {
                        setTagStatus("保存完了（位置情報は未反映。SQL_DOCUMENT_TAGS.sql を再実行してください）");
                    }
                }

                if (error) {
                    throw error;
                }

                const dt = new Date(now).toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
                setTagPlacementMode(false);
                setTagStatus(`保存完了: ${dt}`);
                await loadTagList();
                return true;
            } catch (error) {
                console.warn("タグ保存エラー:", error);
                setTagStatus(`タグ保存エラー: ${formatSupabaseError(error)}`);
                return false;
            } finally {
                if (saveBtn) {
                    saveBtn.disabled = false;
                }
            }
        }

        function getPointerPositionOnPdf(event) {
            const canvas = getPdfCanvas();
            const rect = canvas.getBoundingClientRect();
            if (!rect.width || !rect.height) {
                return null;
            }

            const x = (event.clientX - rect.left) / rect.width;
            const y = (event.clientY - rect.top) / rect.height;
            return {
                x: Math.max(0, Math.min(1, x)),
                y: Math.max(0, Math.min(1, y))
            };
        }

        function setupTagPlacementEvents() {
            const canvas = getPdfCanvas();
            canvas.addEventListener("click", (event) => {
                if (!tagPlacementMode) {
                    return;
                }
                if (inkModeEnabled) {
                    setTagStatus("手書きモード中は位置指定できません（手書きOFFで指定してください）");
                    return;
                }

                const position = getPointerPositionOnPdf(event);
                if (!position) {
                    return;
                }
                openTagFloatBox(position);
            });
        }

        function setupSelectionLookupEvents() {
            const stage = document.getElementById("pdf-stage");
            if (!stage) {
                return;
            }

            stage.addEventListener("mouseup", scheduleSelectionLookup);
            stage.addEventListener("touchend", scheduleSelectionLookup);
            document.addEventListener("selectionchange", () => {
                const selected = getCurrentSelectedTextInPdf();
                if (!selected) {
                    return;
                }
                setSelectionQueryText(selected);
            });
        }

        async function saveInkNote(options = {}) {
            const quiet = !!options.quiet;
            const allowEmpty = !!options.allowEmpty;
            const memberId = getNoteMemberId();
            if (!memberId || !currentSessionId || !currentFileName) {
                if (!quiet) {
                    setInkStatus("保存対象の情報が不足しています");
                }
                return false;
            }

            const inkPayload = buildInkPayloadForSave();
            const pageKeys = Object.keys(inkPayload.pages || {});
            if (pageKeys.length === 0) {
                if (!allowEmpty) {
                    if (!quiet) {
                        setInkStatus("保存対象なし（1本以上描いてから保存してください）");
                    }
                    return false;
                }

                try {
                    const supabase = getNoteClient();
                    const { error } = await supabase
                        .from("document_ink_notes")
                        .delete()
                        .eq("member_id", memberId)
                        .eq("session_id", currentSessionId)
                        .eq("document_name", currentFileName);

                    if (error) {
                        throw error;
                    }

                    if (!quiet) {
                        setInkStatus("手書きは空のため削除を保存しました");
                    }
                    return true;
                } catch (error) {
                    console.warn("手書きメモ自動削除エラー:", error);
                    if (!quiet) {
                        setInkStatus("手書き保存エラー");
                    }
                    return false;
                }
            }

            if (!quiet) {
                setInkStatus("手書き保存中...");
            }

            try {
                const supabase = getNoteClient();
                const now = new Date().toISOString();
                const { error } = await supabase
                    .from("document_ink_notes")
                    .upsert({
                        member_id: memberId,
                        session_id: currentSessionId,
                        document_name: currentFileName,
                        ink_payload: inkPayload,
                        updated_at: now
                    }, { onConflict: "member_id,session_id,document_name" });

                if (error) {
                    throw error;
                }

                const dt = new Date(now).toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
                if (!quiet) {
                    setInkStatus(`最終保存: ${dt}（${pageKeys.length}ページ）`);
                }
                return true;
            } catch (error) {
                console.warn("手書きメモ保存エラー:", error);
                if (!quiet) {
                    setInkStatus("手書き保存エラー");
                }
                return false;
            }
        }

        async function clearInkNote() {
            const memberId = getNoteMemberId();

            resetInkData();
            setInkStatus("手書き削除中...");

            if (!memberId || !currentSessionId || !currentFileName) {
                setInkStatus("未保存");
                return;
            }

            try {
                const supabase = getNoteClient();
                const { error } = await supabase
                    .from("document_ink_notes")
                    .delete()
                    .eq("member_id", memberId)
                    .eq("session_id", currentSessionId)
                    .eq("document_name", currentFileName);

                if (error) {
                    throw error;
                }

                setInkStatus("手書きを削除しました");
            } catch (error) {
                console.warn("手書きメモ削除エラー:", error);
                setInkStatus("手書き削除エラー");
            }
        }

        async function confirmAndClearInkNote() {
            const ok = window.confirm("この資料の手書きを全て消去します。よろしいですか？");
            if (!ok) {
                return;
            }
            await clearInkNote();
        }

        function undoInkStroke() {
            if (inkStrokes.length === 0) {
                return;
            }

            inkStrokes.pop();
            syncCurrentPageInkToStore();
            updateInkCanvasVisibility();
            redrawInkCanvas();
            setInkStatus("未保存");
        }

        function setInkTool(tool) {
            const nextTool = tool === "marker" ? "marker" : "pen";

            if (inkModeEnabled && inkTool === nextTool) {
                inkModeEnabled = false;
                updateInkCanvasVisibility();
                redrawInkCanvas();
                if (inkStrokes.length > 0) {
                    setInkStatus(`最終状態: ${currentPageNumber}ページ ${inkStrokes.length}件`);
                } else {
                    setInkStatus("描画モードOFF");
                }
                return;
            }

            inkTool = nextTool;
            inkModeEnabled = true;
            if (inkTool === "marker") {
                setInkSizeValue(24);
            }
            updateInkCanvasVisibility();
            redrawInkCanvas();
            updateInkToolButtons();
            setInkStatus(inkTool === "marker"
                ? `手書きモードON: ${currentPageNumber}ページにマーカー描画中`
                : `手書きモードON: ${currentPageNumber}ページに描画中`);
        }

        function setInkColorValue(color) {
            if (!color) {
                return;
            }
            inkColor = color;
            syncInkSettingInputs();
        }

        function setInkSizeValue(sizeValue) {
            const num = Number(sizeValue);
            if (!Number.isFinite(num)) {
                return;
            }
            inkSize = Math.max(1, Math.min(24, num));
            syncInkSettingInputs();
        }

        function getReturnTo() {
            const value = getParam("returnTo");
            return value || "assembly-documents.html";
        }

        function getPdfUrl() {
            return getParam("pdf");
        }

        function getLabel() {
            return getParam("label") || "資料";
        }

        async function closeViewer() {
            const finishBtn = document.getElementById("finish-btn");
            finishBtn.disabled = true;
            setInkStatus("終了前に手書きを自動保存中...");

            try {
                await saveInkNote({ quiet: true, allowEmpty: true });
            } catch (error) {
                console.warn("終了時の手書き自動保存に失敗:", error);
            }

            const returnTo = getReturnTo();

            if (window.opener && !window.opener.closed) {
                try {
                    window.opener.location.href = returnTo;
                    window.opener.focus();
                } catch (error) {
                    console.warn("親画面のフォーカスに失敗しました。", error);
                }

                window.close();

                // 手動で開かれたタブなど close できない場合のフォールバック
                setTimeout(() => {
                    if (!window.closed) {
                        window.location.href = returnTo;
                    }
                }, 120);
                return;
            }

            window.location.href = returnTo;
        }

        async function renderPdf(pdfUrl) {
            const pathLabel = document.getElementById("viewer-path");

            releasePdfObjectUrl();
            pdfDoc = null;
            currentPageNumber = 1;
            updatePdfPageIndicator();

            if (!pdfUrl) {
                pathLabel.textContent = "PDF URLが指定されていません。";
                return;
            }

            pathLabel.textContent = "PDFを読み込み中...";

            try {
                if (!pdfjsLib || typeof pdfjsLib.getDocument !== "function") {
                    throw new Error("PDF.jsの初期化に失敗しました");
                }

                const response = await fetch(pdfUrl);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const bytes = await response.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
                currentPageNumber = 1;
                await renderPdfPage(currentPageNumber);
                pathLabel.textContent = `表示中: ${pdfUrl}`;
            } catch (error) {
                console.warn("PDF読込に失敗しました。", error);
                pathLabel.textContent = `PDF表示エラー: ${error.message || "不明なエラー"}`;
            }
        }

        async function initViewer() {
            const pdfUrl = getPdfUrl();
            const label = getLabel();
            const session = getParam("session");
            const fileName = getParam("fileName");
            const openPage = Number(getParam("openPage") || "0");
            const focusX = Number(getParam("focusX") || "");
            const focusY = Number(getParam("focusY") || "");

            currentSessionId = session;
            currentFileName = fileName;

            document.getElementById("viewer-title").textContent = label;
            document.getElementById("viewer-subtitle").textContent = session ? `第${session}回議会` : "議会資料";
            setSelectionQueryText("(未選択)");
            setSelectionLookupStatus("待機中");
            renderSelectionLookupResults([]);
            await renderPdf(pdfUrl);
            await loadInkNote();
            await loadTextNote();
            await loadTagList();

            if (openPage > 0) {
                await goToPdfPage(openPage);
            }
            if (Number.isFinite(focusX) && Number.isFinite(focusY)) {
                setTagStatus(`位置付きタグを表示中（${currentPageNumber}ページ）`);
            }
        }

        document.getElementById("finish-btn").addEventListener("click", closeViewer);
        document.getElementById("ink-tool-pen-btn-top").addEventListener("click", () => setInkTool("pen"));
        document.getElementById("ink-tool-marker-btn-top").addEventListener("click", () => setInkTool("marker"));
        document.getElementById("ink-tool-pen-btn").addEventListener("click", () => setInkTool("pen"));
        document.getElementById("ink-tool-marker-btn").addEventListener("click", () => setInkTool("marker"));
        document.getElementById("ink-color-top").addEventListener("input", (event) => setInkColorValue(event.target.value));
        document.getElementById("ink-color").addEventListener("input", (event) => setInkColorValue(event.target.value));
        document.getElementById("ink-size-top").addEventListener("input", (event) => setInkSizeValue(event.target.value));
        document.getElementById("ink-size").addEventListener("input", (event) => setInkSizeValue(event.target.value));
        document.getElementById("ink-clear-btn-top").addEventListener("click", confirmAndClearInkNote);
        document.getElementById("ink-clear-btn").addEventListener("click", confirmAndClearInkNote);
        document.getElementById("ink-undo-btn-top").addEventListener("click", undoInkStroke);
        document.getElementById("ink-undo-btn").addEventListener("click", undoInkStroke);
        document.getElementById("pdf-prev-page-btn-top").addEventListener("click", () => goToPdfPage(currentPageNumber - 1));
        document.getElementById("pdf-next-page-btn-top").addEventListener("click", () => goToPdfPage(currentPageNumber + 1));
        document.getElementById("pdf-prev-page-btn").addEventListener("click", () => goToPdfPage(currentPageNumber - 1));
        document.getElementById("pdf-next-page-btn").addEventListener("click", () => goToPdfPage(currentPageNumber + 1));
        document.getElementById("memo-save-btn").addEventListener("click", saveTextNote);
        document.getElementById("memo-clear-btn").addEventListener("click", clearTextNote);
        document.getElementById("tag-list-btn-top").addEventListener("click", scrollToTagListPanel);
        document.getElementById("tag-list-btn").addEventListener("click", scrollToTagListPanel);
        const toggleTagMode = () => setTagPlacementMode(!tagPlacementMode);
        document.getElementById("tag-pick-mode-btn-top").addEventListener("click", toggleTagMode);
        document.getElementById("tag-pick-mode-btn").addEventListener("click", toggleTagMode);
        document.getElementById("tag-float-cancel-btn").addEventListener("click", () => {
            closeTagFloatBox();
            setTagPlacementMode(false);
        });
        document.getElementById("tag-float-save-btn").addEventListener("click", async () => {
            const input = document.getElementById("tag-float-input");
            const saved = await saveDocumentTag(input.value, pendingTagPosition);
            if (saved) {
                closeTagFloatBox();
            }
        });
        document.getElementById("tag-pin-edit-btn").addEventListener("click", async () => {
            const popover = getTagPinPopover();
            const tagId = Number((popover && popover.dataset.tagId) || "");
            const tag = findTagById(tagId);
            if (!tag) {
                setTagStatus("編集対象のタグが見つかりません");
                return;
            }

            const nextText = window.prompt("タグ内容を編集してください", tag.tag_text || "");
            if (nextText === null) {
                return;
            }
            const ok = await updateDocumentTagText(tagId, nextText);
            if (ok) {
                closeTagPinPopover();
            }
        });
        document.getElementById("tag-pin-delete-btn").addEventListener("click", async () => {
            const popover = getTagPinPopover();
            const tagId = Number((popover && popover.dataset.tagId) || "");
            if (!Number.isFinite(tagId)) {
                setTagStatus("削除対象のタグが見つかりません");
                return;
            }

            const ok = window.confirm("このタグを削除します。よろしいですか？");
            if (!ok) {
                return;
            }
            const deleted = await deleteDocumentTag(tagId);
            if (deleted) {
                closeTagPinPopover();
            }
        });
        document.getElementById("tag-pin-close-btn").addEventListener("click", closeTagPinPopover);
        document.getElementById("tag-list-body").addEventListener("click", (event) => {
            const actionBtn = event.target.closest("button[data-tag-action]");
            if (actionBtn) {
                const action = actionBtn.dataset.tagAction;
                const tagId = Number(actionBtn.dataset.tagId || "");

                if (action === "edit") {
                    const currentText = actionBtn.dataset.tagText || "";
                    const nextText = window.prompt("タグ内容を編集してください", currentText);
                    if (nextText === null) {
                        return;
                    }
                    updateDocumentTagText(tagId, nextText);
                    return;
                }

                if (action === "delete") {
                    const ok = window.confirm("このタグを削除します。よろしいですか？");
                    if (!ok) {
                        return;
                    }
                    deleteDocumentTag(tagId);
                    return;
                }
            }

            const button = event.target.closest("button[data-viewer-url]");
            if (!button) {
                return;
            }

            const viewerUrl = button.dataset.viewerUrl;
            if (!viewerUrl) {
                return;
            }

            const popup = window.open(viewerUrl, "_blank");
            if (!popup) {
                window.location.href = viewerUrl;
            }
        });
        document.getElementById("tag-float-input").addEventListener("keydown", async (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                const input = document.getElementById("tag-float-input");
                const saved = await saveDocumentTag(input.value, pendingTagPosition);
                if (saved) {
                    closeTagFloatBox();
                }
            }
        });
        document.getElementById("pdf-stage").addEventListener("click", (event) => {
            const pin = event.target.closest("#tag-pin-layer .pointer-events-auto");
            const popover = event.target.closest("#tag-pin-popover");
            if (pin || popover) {
                return;
            }
            closeTagPinPopover();
        });
        setupInkCanvasEvents();
        setupTagPlacementEvents();
        setupSelectionLookupEvents();
        updateTagPickModeButton();
        updateInkCanvasVisibility();

        portalAuth.init({
            requireAuth: true,
            minRole: "viewer",
            returnTo: "assembly-documents.html",
            onReady: initViewer
        });

        window.addEventListener("beforeunload", releasePdfObjectUrl);
    </script>
</body>
</html>
